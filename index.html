<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #0F1114; min-height: 100vh; }
  body { display:flex; flex-direction:column; align-items:center; padding: 24px 16px; }
  .tj { font-family: 'Inter', -apple-system, sans-serif; color: var(--tj-text); background: transparent; max-width: 1100px; width: 100%; }
  .tj :where(input, select, textarea, button) { font-family: inherit; }
  .tj-mono { font-family: 'IBM Plex Mono', monospace; }
  .tj-serif { font-family: 'Source Serif 4', Georgia, serif; }
  .tj :where(input, select, textarea) { min-height: 38px; font-size: 16px; }
  .tj button { min-height: 38px; }
  #tj-tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  #tj-tabs::-webkit-scrollbar { display: none; }
  #tj-tabs button { flex-shrink: 0; white-space: nowrap; }
  @media (max-width: 640px) {
    body { padding: 0; }
    .tj { border-radius: 0; border-left: none; border-right: none; }
    .tj-serif { font-size: 17px !important; }
    #tj-header-row { flex-direction: column; align-items: stretch !important; gap: 12px !important; padding: 16px 14px 12px !important; }
    #tj-header-right { flex-direction: column; align-items: stretch !important; gap: 10px !important; width: 100%; }
    #tj-tabs { width: 100%; -webkit-mask-image: linear-gradient(90deg, transparent, black 14px, black calc(100% - 14px), transparent); mask-image: linear-gradient(90deg, transparent, black 14px, black calc(100% - 14px), transparent); }
    #tj-tabs button { font-size: 12px !important; padding: 7px 11px !important; }
    #tj-user-box { justify-content: space-between !important; width: 100%; }
    #tj-body { padding: 14px 12px 18px !important; }
    .tj-ai-card { padding: 18px 16px !important; }
    .tj-ai-content table { font-size: 11px !important; }
    .tj-ai-content th, .tj-ai-content td { padding: 6px 7px !important; }
    div[style*="grid-template-columns:repeat(2"] { grid-template-columns: 1fr !important; }
  }
  .tj-ai-card { background: linear-gradient(180deg, var(--tj-panel), var(--tj-panel) 60px, var(--tj-panel2) 60px, var(--tj-panel2)); background: var(--tj-panel); border: 0.5px solid var(--tj-border); border-radius: 14px; padding: 28px 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.25); }
  .tj-ai-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 0.5px solid var(--tj-border); }
  .tj-ai-card-header .tj-ai-icon { width: 26px; height: 26px; border-radius: 8px; background: linear-gradient(135deg, var(--tj-accent), #8fc4e8); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; }
  .tj-ai-card-header .tj-ai-title { font-family: 'Source Serif 4', Georgia, serif; font-size: 15px; color: var(--tj-text); font-weight: 600; }
  .tj-ai-card-header .tj-ai-sub { font-size: 11px; color: var(--tj-text3); margin-top: 1px; }
  .tj-ai-content { font-size: 13.5px; line-height: 1.8; color: var(--tj-text2); }
  .tj-ai-content h1, .tj-ai-content h2, .tj-ai-content h3 { color: var(--tj-text); font-family: 'Source Serif 4', Georgia, serif; font-weight: 600; }
  .tj-ai-content h1 { font-size: 18px; margin: 28px 0 14px; padding-bottom: 8px; border-bottom: 1px solid var(--tj-border); }
  .tj-ai-content h1:first-child { margin-top: 0; }
  .tj-ai-content h2 { font-size: 15px; margin: 26px 0 12px; display: flex; align-items: center; gap: 8px; }
  .tj-ai-content h2:first-child { margin-top: 0; }
  .tj-ai-content h2::before { content: ''; width: 4px; height: 15px; border-radius: 3px; background: var(--tj-accent); display: inline-block; }
  .tj-ai-content h3 { font-size: 13.5px; margin: 18px 0 8px; color: var(--tj-accent); }
  .tj-ai-content p { margin: 0 0 14px; }
  .tj-ai-content strong { color: var(--tj-text); font-weight: 700; }
  .tj-ai-content ul, .tj-ai-content ol { margin: 0 0 14px; padding-left: 22px; }
  .tj-ai-content li { margin-bottom: 6px; }
  .tj-ai-content li::marker { color: var(--tj-accent); }
  .tj-ai-content hr { border: none; border-top: 1px dashed var(--tj-border); margin: 24px 0; }
  .tj-ai-content table { width: 100%; border-collapse: separate; border-spacing: 0; margin: 14px 0 18px; font-size: 12.5px; border: 0.5px solid var(--tj-border); border-radius: 10px; overflow: hidden; }
  .tj-ai-content th { text-align: left; padding: 9px 12px; background: var(--tj-panel2); color: var(--tj-text); font-weight: 600; font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.03em; }
  .tj-ai-content td { padding: 9px 12px; border-top: 0.5px solid var(--tj-border); }
  .tj-ai-content tbody tr:nth-child(even) { background: rgba(255,255,255,0.02); }
  .tj-ai-content tbody tr:hover { background: rgba(110,147,176,0.07); }
  .tj-ai-content code { font-family: 'IBM Plex Mono', monospace; background: var(--tj-panel2); padding: 1px 6px; border-radius: 5px; font-size: 12px; color: var(--tj-accent); }
  .tj-ai-content > *:last-child { margin-bottom: 0; }
  .tj-ai-content h2:last-of-type, .tj-ai-content h1:last-of-type { color: var(--tj-green); }
  /* --- დღის გზამკვლევის სტილები --- */
  .tj-dg-card { background: var(--tj-panel); border: 0.5px solid var(--tj-border); border-radius: 12px; margin-bottom: 14px; transition: border-color 0.2s ease; }
  .tj-dg-card.current { border-color: rgba(110,147,176,0.55); box-shadow: 0 0 0 1px rgba(110,147,176,0.15); }
  .tj-dg-card.done:not(.current) { }
  .tj-dg-head { display: flex; align-items: center; gap: 10px; padding: 13px 16px; cursor: pointer; user-select: none; border-radius: 12px; }
  .tj-dg-head:hover { background: rgba(255,255,255,0.02); }
  .tj-dg-num { width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--tj-border); color: var(--tj-text2); font-size: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: 'IBM Plex Mono', monospace; }
  .tj-dg-num.done { border-color: var(--tj-green); color: var(--tj-green); background: rgba(79,158,118,0.1); }
  .tj-dg-time { margin-left: auto; font-size: 11px; color: var(--tj-text3); }
  .tj-dg-badge { font-size: 10.5px; padding: 2px 8px; border-radius: 999px; border: 0.5px solid var(--tj-accent); color: var(--tj-accent); flex-shrink: 0; }
  .tj-dg-chevron { color: var(--tj-text3); font-size: 15px; transition: transform 0.18s ease; flex-shrink: 0; line-height: 1; }
  .tj-dg-body { padding: 4px 18px 18px 50px; }
  @media (max-width: 640px) { .tj-dg-body { padding-left: 16px; } .tj-dg-time { display: none; } }
  .tj-dg-opt { padding: 7px 13px; border-radius: 8px; font-size: 12.5px; cursor: pointer; border: 0.5px solid var(--tj-border); background: transparent; color: var(--tj-text2); transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease; }
  .tj-dg-opt:hover { border-color: var(--tj-accent); color: var(--tj-text); }
  .tj-dg-opt.sel { border-color: var(--tj-accent); background: rgba(110,147,176,0.16); color: var(--tj-text); }
  .tj-dg-flag { border-radius: 9px; padding: 10px 13px; font-size: 12.5px; line-height: 1.6; color: var(--tj-text2); background: rgba(255,255,255,0.02); border-left: 3px solid var(--tj-text3); }
  .tj-dg-flag.red { border-left-color: var(--tj-red); background: rgba(189,90,76,0.07); }
  .tj-dg-flag.yellow { border-left-color: var(--tj-amber); background: rgba(201,154,80,0.06); }
  .tj-dg-flag.green { border-left-color: var(--tj-green); background: rgba(79,158,118,0.07); }
  .tj-dg-flag-label { font-size: 10.5px; letter-spacing: 0.4px; text-transform: uppercase; color: var(--tj-text3); margin-bottom: 3px; }
  .tj-dg-flag.red .tj-dg-flag-label { color: var(--tj-red); }
  .tj-dg-flag.yellow .tj-dg-flag-label { color: var(--tj-amber); }
  .tj-dg-flag.green .tj-dg-flag-label { color: var(--tj-green); }
  .tj-dg-opt { position: relative; }
  .tj-dg-i { display: inline-flex; align-items: center; justify-content: center; width: 14px; height: 14px; border-radius: 50%; border: 1px solid var(--tj-text3); color: var(--tj-text3); font-size: 9.5px; font-family: 'Source Serif 4', Georgia, serif; font-style: italic; margin-left: 7px; vertical-align: middle; position: relative; cursor: help; }
  .tj-dg-opt.sel .tj-dg-i, .tj-dg-opt:hover .tj-dg-i { border-color: var(--tj-accent); color: var(--tj-accent); }
  .tj-dg-tip { display: none; position: absolute; bottom: calc(100% + 10px); left: 50%; transform: translateX(-50%); width: min(280px, 78vw); background: var(--tj-panel2); border: 0.5px solid var(--tj-border); border-radius: 10px; padding: 10px 12px; font-size: 11.5px; line-height: 1.6; color: var(--tj-text2); text-align: left; z-index: 80; box-shadow: 0 8px 24px rgba(0,0,0,0.4); font-family: 'Inter', sans-serif; font-style: normal; white-space: normal; pointer-events: none; }
  .tj-dg-tip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 6px solid transparent; border-top-color: var(--tj-panel2); }
  .tj-dg-i:hover .tj-dg-tip, .tj-dg-tip.show { display: block; }
  .tj-dg-rec { border-radius: 9px; padding: 9px 13px; font-size: 12.5px; line-height: 1.55; background: rgba(255,255,255,0.02); border-left: 3px solid var(--tj-text3); }
  .tj-dg-rec.green { border-left-color: var(--tj-green); }
  .tj-dg-rec.yellow { border-left-color: var(--tj-amber); }
  .tj-dg-rec.red { border-left-color: var(--tj-red); }
  .tj-dg-rec-title { font-size: 10.5px; letter-spacing: 0.4px; text-transform: uppercase; margin-bottom: 4px; color: var(--tj-text3); }
  .tj-dg-rec.green .tj-dg-rec-title { color: var(--tj-green); }
  .tj-dg-rec.yellow .tj-dg-rec-title { color: var(--tj-amber); }
  .tj-dg-rec.red .tj-dg-rec-title { color: var(--tj-red); }
  .tj-dg-rec-item { color: var(--tj-text2); margin-bottom: 3px; }
  .tj-dg-rec-item:last-child { margin-bottom: 0; }
  .tj-dg-rec-item::before { content: '·'; color: var(--tj-text3); margin-right: 7px; }
  .tj-dg-summary { background: var(--tj-panel); border: 0.5px solid var(--tj-border); border-radius: 12px; padding: 14px 18px; margin-bottom: 18px; display: flex; justify-content: space-between; align-items: center; gap: 14px; }
  .tj-progress-track { position: relative; height: 10px; border-radius: 999px; background: var(--tj-panel2); overflow: hidden; border: 0.5px solid var(--tj-border); }
  .tj-progress-fill { height: 100%; border-radius: 999px; width: 0%; background: linear-gradient(90deg, #5c7f99, var(--tj-accent), #8fc4e8); background-size: 200% 100%; animation: tj-progress-shimmer 1.6s linear infinite; transition: width 0.45s cubic-bezier(0.22, 1, 0.36, 1); }
  @keyframes tj-progress-shimmer { 0% { background-position: 0% 0; } 100% { background-position: -200% 0; } }
  .tj-progress-label { font-size: 12.5px; color: var(--tj-text2); transition: opacity 0.25s ease; }
  .tj-progress-pct { font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; color: var(--tj-accent); font-variant-numeric: tabular-nums; }
  .tj-progress-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--tj-accent); margin-right: 8px; animation: tj-progress-pulse 1.1s ease-in-out infinite; }
  @keyframes tj-progress-pulse { 0%, 100% { opacity: 0.35; transform: scale(0.85); } 50% { opacity: 1; transform: scale(1.15); } }
</style>

  function getFilteredTrades(){
    return trades.filter(t=>{
      if (filters.instrument.length && !filters.instrument.includes(t.instrument)) return false;
      if (filters.tradeType.length && !filters.tradeType.includes(t.tradeType||'opening_reversal')) return false;
      if (filters.direction.length && !filters.direction.includes(t.direction)) return false;
      if (filters.outcome.length && !filters.outcome.includes(t.outcome)) return false;
      if (filters.magnet.length && !filters.magnet.includes(t.magnet)) return false;
      if (filters.signalQuality.length && !filters.signalQuality.includes(t.signalQuality)) return false;
      if (filters.accountId.length && !filters.accountId.includes(t.accountId||'')) return false;
      if (filters.dateFrom && t.date < filters.dateFrom) return false;
      if (filters.dateTo && t.date > filters.dateTo) return false;
      return true;
    });
  }

  function getEquityBaselineBalance(){
    if (filters.accountId && filters.accountId.length === 1){

      if (acc) return parseFloat(acc.startBalance) || 0;

  function renderFilterBar(){

    `;

  function wireFilterBar(onChange){
    const bar = bodyEl.querySelector('#tj-filterbar');
    if (!bar) return;
    bar.querySelectorAll('.tj-mf-box').forEach(cb=>{
      cb.addEventListener('change', ()=>{
        const key = cb.dataset.key;
        const arr = filters[key];
        const idx = arr.indexOf(cb.value);
        if (cb.checked && idx===-1) arr.push(cb.value);
        if (!cb.checked && idx!==-1) arr.splice(idx,1);
        openFilterKey = key;
        onChange();
      });
    });
    bar.querySelectorAll('[data-f]').forEach(el=>{
      el.addEventListener('change', ()=>{
        filters[el.dataset.f] = el.value;
        onChange();
      });
    });
    const clearBtn = bodyEl.querySelector('#tj-clear-filters');
    if (clearBtn) clearBtn.onclick = () => {
      filters = { instrument:[], direction:[], outcome:[], magnet:[], signalQuality:[], tradeType:[], dateFrom:'', dateTo:'' };
      openFilterKey = null;
      onChange();
    };

  const root = document.currentScript.previousElementSibling;

      img.style.maxHeight = '78vh';
      img.style.borderRadius = '8px';
      img.style.display = 'block';
      lightboxContent.appendChild(img);

    img.onerror = () => {
      lightboxContent.innerHTML = `<iframe src="${url}" style="width:100%; height:75vh; border:none; border-radius:8px; background:#fff;"></iframe>`;

  lightboxClose.addEventListener('click', closeChartModal);

  document.addEventListener('click', (e)=>{

  const logoutBtn = root.querySelector('#tj-logout-btn');

  function authBtnStyle(active){
    return `padding:6px 16px; border-radius:8px; font-size:13px; cursor:pointer; border:0.5px solid ${active? 'var(--tj-accent)':'var(--tj-border)'}; background:${active? 'rgba(110,147,176,0.15)':'transparent'}; color:${active? 'var(--tj-text)':'var(--tj-text2)'};`;

  function renderAuthTabs(){

    });

  function renderAuthBody(){
    if (authTab === 'login') renderLoginForm(); else renderRegisterForm();
  }

  function describeError(err){
    if (!err) return 'უცნობი შეცდომა';
    if (typeof err === 'string') return err;
    if (err.message) return err.message;
    try {
      const s = JSON.stringify(err);
      return (s && s !== '{}') ? s : 'უცნობი შეცდომა — დეტალები Console-ში (F12).';
    } catch(e){ return 'უცნობი შეცდომა — დეტალები Console-ში (F12).'; }
  }

  function renderLoginForm(){
    authBodyEl.innerHTML = `
      <form id="tj-login-form">
        <div style="margin-bottom:12px;">${fieldLabel('ელფოსტა')}<input type="email" name="email" required style="${inputStyle()}"/></div>
        <div style="margin-bottom:6px;">${fieldLabel('პაროლი')}<input type="password" name="password" required style="${inputStyle()}"/></div>
        <button type="submit" style="width:100%; margin-top:14px; padding:10px; border-radius:8px; border:0.5px solid var(--tj-accent); background:rgba(110,147,176,0.18); color:var(--tj-text); font-size:13px; cursor:pointer;">შესვლა</button>
        ${authMsgBox()}
      </form>
    `;
    const form = authBodyEl.querySelector('#tj-login-form');
    form.addEventListener('submit', async (e)=>{
      e.preventDefault();
      const fd = new FormData(form);
      const msg = form.querySelector('#tj-auth-msg');
      msg.style.color = 'var(--tj-text2)'; msg.textContent = 'შესვლა მიმდინარეობს…';
      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email: fd.get('email'), password: fd.get('password') });
        if (error){
          msg.style.color = 'var(--tj-red)';
          msg.textContent = error.message === 'Invalid login credentials' ? 'ელფოსტა ან პაროლი არასწორია.' : describeError(error);
          console.error('signIn error:', error);
          return;
        }
        await onAuthSuccess(data.user);
      } catch(ex){
        msg.style.color = 'var(--tj-red)';
        msg.textContent = 'კავშირის შეცდომა — შეამოწმეთ SUPABASE_URL და ინტერნეტ კავშირი. დეტალები: Console (F12).';
        console.error('signIn exception:', ex);
      }
    });
  }

  function renderRegisterForm(){
    authBodyEl.innerHTML = `
      <form id="tj-register-form">
        <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(180px,1fr)); gap:12px; margin-bottom:12px;">
          <div>${fieldLabel('სახელი')}<input type="text" name="firstName" required style="${inputStyle()}"/></div>
          <div>${fieldLabel('გვარი')}<input type="text" name="lastName" required style="${inputStyle()}"/></div>
        </div>
        <div style="margin-bottom:12px;">
          ${fieldLabel('თრეიდინგის გამოცდილება')}
          <select name="experience" style="${inputStyle()}">
            <option value="< 1 წელი">&lt; 1 წელი</option>
            <option value="1-3 წელი">1–3 წელი</option>
            <option value="3-5 წელი">3–5 წელი</option>
            <option value="5+ წელი">5+ წელი</option>
          </select>
        </div>
        <div style="margin-bottom:12px;">${fieldLabel('ელფოსტა')}<input type="email" name="email" required style="${inputStyle()}"/></div>
        <div style="margin-bottom:6px;">${fieldLabel('პაროლი (მინ. 6 სიმბოლო)')}<input type="password" name="password" minlength="6" required style="${inputStyle()}"/></div>
        <button type="submit" style="width:100%; margin-top:14px; padding:10px; border-radius:8px; border:0.5px solid var(--tj-accent); background:rgba(110,147,176,0.18); color:var(--tj-text); font-size:13px; cursor:pointer;">რეგისტრაცია</button>
        ${authMsgBox()}
      </form>
    `;
    const form = authBodyEl.querySelector('#tj-register-form');
    form.addEventListener('submit', async (e)=>{
      e.preventDefault();
      const fd = new FormData(form);
      const msg = form.querySelector('#tj-auth-msg');
      msg.style.color = 'var(--tj-text2)'; msg.textContent = 'იგზავნება…';
      const email = fd.get('email');
      try {
        const { data, error } = await supabase.auth.signUp({
          email,
          password: fd.get('password'),
          options: { data: {
            first_name: fd.get('firstName'),
            last_name: fd.get('lastName'),
            experience: fd.get('experience')
          }}
        });
        if (error){
          msg.style.color = 'var(--tj-red)';
          msg.textContent = describeError(error);
          console.error('signUp error:', error);
          return;
        }
        renderVerifyForm(email);

        msg.style.color = 'var(--tj-red)';
        msg.textContent = 'კავშირის შეცდომა — შეამოწმეთ SUPABASE_URL და ინტერნეტ კავშირი. დეტალები: Console (F12).';
        console.error('signUp exception:', ex);
      }
    });
  }

  function renderVerifyForm(email){
    authBodyEl.innerHTML = `
      <div style="text-align:center; font-size:13px; color:var(--tj-text2); margin-bottom:16px;">
        კოდი გამოგზავნილია მისამართზე<br/><span style="color:var(--tj-text); font-weight:500;">${email}</span>
      </div>
      <form id="tj-verify-form">
        <div style="margin-bottom:12px;">
          ${fieldLabel('დაადასტურეთ კოდი')}

        </div>
        <button type="submit" style="width:100%; margin-top:6px; padding:10px; border-radius:8px; border:0.5px solid var(--tj-accent); background:rgba(110,147,176,0.18); color:var(--tj-text); font-size:13px; cursor:pointer;">დადასტურება</button>

      </form>

          msg.style.color = 'var(--tj-red)';
          msg.textContent = 'კოდი არასწორია ან ვადა გაუვიდა. (' + describeError(error) + ')';

          return;
        }
        await onAuthSuccess(data.user);
      } catch(ex){
        msg.style.color = 'var(--tj-red)';
        msg.textContent = 'კავშირის შეცდომა — შეამოწმეთ SUPABASE_URL და ინტერნეტ კავშირი. დეტალები: Console (F12).';
        console.error('verifyOtp exception:', ex);

      }
      setTimeout(()=>{ btn.disabled=false; btn.textContent='კოდის ხელახლა გაგზავნა'; }, 5000);
    };

    const reasonBoxes = form.querySelectorAll('input[name=reasons]');
    function sync(){
      const on = Array.from(form.querySelectorAll('input[name=reasons]:checked')).some(b => b.value === 'კარგი Signal bar პატერნი');
      wrap.style.display = on ? 'block' : 'none';

  function computeTraderProfile(){
    const closed = trades.filter(t=>t.outcome);
    if (closed.length < 10) return null;

    function statsBy(keyFn){
      const map = {};
      closed.forEach(t=>{
        const k = keyFn(t);
        if (!k) return;
        if (!map[k]) map[k] = {wins:0,total:0};
        map[k].total++;
        if (t.outcome==='win') map[k].wins++;
      });
      return Object.entries(map)
        .filter(([k,v])=>v.total>=3)
        .map(([k,v])=>({key:k, winRate: Math.round(v.wins/v.total*100), n:v.total}))
        .sort((a,b)=>b.winRate-a.winRate);
    }

    const byType = statsBy(t=>{
      const tt = KEYS.tradeTypes.find(x=>x.value===(t.tradeType||'opening_reversal'));
      return tt ? tt.label : null;
    });
    const byMagnet = statsBy(t=>t.magnet || null);
    const bySignal = statsBy(t=>t.signalQuality || null);

    const lossVetoCounts = {};
    closed.filter(t=>t.outcome==='loss').forEach(t=>{
      (t.veto||[]).forEach(v=>{ lossVetoCounts[v] = (lossVetoCounts[v]||0)+1; });
    });
    const topVeto = Object.entries(lossVetoCounts).sort((a,b)=>b[1]-a[1])[0] || null;

    return { byType, byMagnet, bySignal, topVeto, totalClosed: closed.length };
  }

  function evaluateHistoricalVerdict(t){
    let redCount = 0, yellowCount = 0;
    const tradeType = t.tradeType || 'opening_reversal';
    const signalQuality = t.signalQuality || '';
    const reasonsN = (t.reasons||[]).length;
    const veto = t.veto || [];

    if (t.alwaysIn === 'unclear'){
      yellowCount++;
    } else if (t.alwaysIn === 'long' || t.alwaysIn === 'short'){
      if (t.direction === t.alwaysIn){
        // green — ემატება არაფერი
      } else if (tradeType !== 'reversal'){
        redCount++;
      } else {
        yellowCount++;
      }
    }

    veto.forEach(v=>{
      if (v === 'Doji signal bar' && signalQuality === 'Doji') return; // დუბლირების თავიდან აცილება
      redCount++;
    });

    if (reasonsN === 0) redCount++;
    else if (reasonsN === 1) yellowCount++;

    if (signalQuality === 'Doji'){
      if (tradeType === 'reversal') redCount++;
      else yellowCount++;
    }
    else if (signalQuality === 'საპირისპირო ტრენდული ბარი') yellowCount++;
    else if (signalQuality === 'სუსტი trend bar') yellowCount++;

    if (tradeType !== 'with_trend' && tradeType !== 'tr_fade' && tradeType !== 'reversal'){
      if (!t.magnet) yellowCount++;
      if (!(t.criteria||[]).length) yellowCount++;
    }
    if (tradeType === 'with_trend'){
      if (!(t.trendDayTypes||[]).length) yellowCount++;
      if ((t.trendDayTypes||[]).includes('Shrinking Stairs')) yellowCount++;
    }
    if (tradeType === 'tr_fade'){
      if (!(t.trendDayTypes||[]).length) redCount++;
      if (t.twoLegEnd === 'no') yellowCount++;
    }
    if (tradeType === 'reversal'){
      if (!t.trendlineBreak) yellowCount++;
      else if (t.trendlineBreak === 'no') redCount++;
      if (t.reversalType === 'Major Trend Reversal'){
        const majorN = (t.majorReversalConditions||[]).length;
        if (majorN < 4) { if (majorN <= 1) redCount++; else yellowCount++; }
      } else if (['Climactic Reversal','3 Push','Expanding Triangle','Shrinking Stairs','Final Flag Reversal'].includes(t.reversalType)){
        yellowCount++;
      } else if (t.reversalType === 'არ ვვაჭრობ Reversal-ზე'){
        redCount++;
      }
    }

    if (redCount >= 2 || (redCount>=1 && yellowCount>=2)) return 'weak';
    if (redCount >= 1 || yellowCount >= 2) return 'caution';
    return 'strong';
  }

  function wirePositionCalcWidget(container){
    const riskInput = container.querySelector('#tj-poscalc-risk');
    const instrumentSel = container.querySelector('#tj-poscalc-instrument');
    const commissionInput = container.querySelector('#tj-poscalc-commission');
    const tableEl = container.querySelector('#tj-poscalc-table');
    instrumentSel.addEventListener('change', () => {
      commissionInput.value = DEFAULT_COMMISSION_ROUNDTURN[instrumentSel.value] ?? 1.02;
      update();
    });
    function update(){
      const risk = parseFloat(riskInput.value) || 0;
      const perPoint = POINT_VALUES[instrumentSel.value];
      const commission = parseFloat(commissionInput.value) || 0;
      const pointRows = POSCALC_ROWS_BY_INSTRUMENT[instrumentSel.value] || POSCALC_ROWS_BY_INSTRUMENT.ES;
      const rows = pointRows.map(pts => {
        const rawContracts = risk / (pts * perPoint);
        const contracts = Math.floor(rawContracts);
        const actualRisk = contracts * pts * perPoint;
        const totalCommission = contracts * commission;
        const netRisk = actualRisk + totalCommission;
        return { pts, contracts, actualRisk, totalCommission, netRisk };
      });
      tableEl.innerHTML = `
        <table style="width:auto; min-width:0; border-collapse:collapse; font-size:12.5px;">
          <thead>
            <tr style="border-bottom:0.5px solid var(--tj-border);">
              <th style="text-align:right; padding:5px 10px; color:var(--tj-text2); font-weight:500;">Stop (pt)</th>
              <th style="text-align:right; padding:5px 10px; color:var(--tj-text2); font-weight:500;">კონტრაქტი</th>
              <th style="text-align:right; padding:5px 10px; color:var(--tj-text2); font-weight:500;">რისკი</th>
              <th style="text-align:right; padding:5px 10px; color:var(--tj-text2); font-weight:500;">საკომისიო</th>
              <th style="text-align:right; padding:5px 10px; color:var(--tj-text2); font-weight:500;">წმინდა რისკი</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(r=>`
              <tr style="border-bottom:0.5px solid var(--tj-border);">
                <td style="padding:4px 10px; text-align:right; color:var(--tj-text);">${r.pts}</td>
                <td style="padding:4px 10px; text-align:right; color:${r.contracts===0?'var(--tj-red)':'var(--tj-text)'};">${r.contracts === 0 ? '—' : r.contracts}</td>
                <td style="padding:4px 10px; text-align:right; color:var(--tj-text2);">$${r.actualRisk.toFixed(0)}</td>
                <td style="padding:4px 10px; text-align:right; color:var(--tj-text3);">$${r.totalCommission.toFixed(2)}</td>
                <td style="padding:4px 10px; text-align:right; color:var(--tj-text);">$${r.netRisk.toFixed(2)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }
    riskInput.addEventListener('input', update);
    commissionInput.addEventListener('input', update);
    update();
  }

          <div style="font-size:11px; color:var(--tj-text3); margin-bottom:10px;">შეამოწმეთ შესვლამდე — არა მხოლოდ წაგების შემდეგ. ყოველი მონიშნული პირობა აისახება ქვემოთ, შეფასებაში.</div>

        <span id="tj-save-msg" style="margin-left:10px; font-size:12px; color:var(--tj-green);"></span>

    if (isEdit){
      bodyEl.querySelector('#tj-cancel-edit').onclick = () => {
        editingTradeId = null;
        renderNewTrade();

    }

    const form = bodyEl.querySelector('#tj-form');
    if (!isEdit) wirePositionCalcWidget(bodyEl);
    const outcomeSel = form.querySelector('[name=outcome]');
    const vetoWrap = form.querySelector('#tj-veto-wrap');
    function syncVeto(){ /* veto ყოველთვის ხილულია — ეს ფუნქცია დარჩა თავსებადობისთვის (გამოძახებულია სხვაგანაც) */ }
    const vetoOtherWrap = form.querySelector('#tj-veto-other-wrap');
    const vetoOtherInput = form.querySelector('[name=vetoOther]');
    function syncVetoOther(){
      const otherChecked = !!form.querySelector('input[name=veto][value="სხვა"]:checked');
      vetoOtherWrap.style.display = otherChecked ? 'block' : 'none';
    }
    form.querySelectorAll('input[name=veto]').forEach(cb=>cb.addEventListener('change', syncVetoOther));
    syncVetoOther();

    const tradeTypeSel = form.querySelector('#tj-tradeType');
    const entryZone = form.querySelector('#tj-entry-criteria-zone');

    function wireEntryCriteriaZone(zonePrefill){
      const reversalTypeSel = entryZone.querySelector('#tj-reversalType');
      if (!reversalTypeSel) return;
      const majorReversalZone = entryZone.querySelector('#tj-major-reversal-zone');
      function syncMajorReversalZone(){
        if (reversalTypeSel.value === 'Major Trend Reversal'){
          majorReversalZone.innerHTML = `
            <div style="margin-top:6px;">
              ${fieldLabel('Major Trend Reversal — 4 პირობა')}
              ${checklistGroup('majorReversalConditions', KEYS.majorReversalConditions, 2, zonePrefill ? zonePrefill.majorReversalConditions : [])}
            </div>
          `;
        } else {
          majorReversalZone.innerHTML = '';
        }
      }
      reversalTypeSel.addEventListener('change', syncMajorReversalZone);
    }
    wireEntryCriteriaZone(prefill);

    tradeTypeSel.addEventListener('change', ()=>{
      entryZone.innerHTML = renderEntryCriteriaZone(tradeTypeSel.value);
      wireEntryCriteriaZone(null);
    });

    const reasonCountEl = form.querySelector('#tj-reason-count');
    const reasonBoxes = form.querySelectorAll('input[name=reasons]');
    function syncReasonCount(){
      const n = form.querySelectorAll('input[name=reasons]:checked').length;
      reasonCountEl.style.color = n >= 2 ? 'var(--tj-green)' : n === 1 ? 'var(--tj-amber)' : 'var(--tj-text3)';
      reasonCountEl.textContent = n === 0 ? 'აირჩიეთ მინიმუმ 2' : n + ' მიზეზი მონიშნული' + (n < 2 ? ' — საჭიროა კიდევ მინიმუმ 1' : '');
    }
    reasonBoxes.forEach(b => b.addEventListener('change', syncReasonCount));
    syncReasonCount();
    wireSignalBarPatternToggle(form);

    const totalUsdEl = form.querySelector('#tj-total-usd');
    const scalpREl = form.querySelector('#tj-scalp-r');
    const swingREl = form.querySelector('#tj-swing-r');
    const totalREl = form.querySelector('#tj-total-r');
    const scalpInput = form.querySelector('[name=scalpUsd]');
    const swing1Input = form.querySelector('[name=swingUsd1]');
    const swing2Input = form.querySelector('[name=swingUsd2]');
    const swing3Input = form.querySelector('[name=swingUsd3]');
    const riskInput = form.querySelector('[name=totalRiskUsd]');

    function num(v){ const n = parseFloat(v); return isNaN(n) ? 0 : n; }

    function syncTotalUsd(){
      const s = num(scalpInput.value);
      const w = num(swing1Input.value) + num(swing2Input.value) + num(swing3Input.value);
      const total = s + w;
      totalUsdEl.textContent = (total >= 0 ? '$' : '-$') + Math.abs(total).toFixed(2);
      totalUsdEl.style.color = total > 0 ? 'var(--tj-green)' : total < 0 ? 'var(--tj-red)' : 'var(--tj-text2)';

      const totalRisk = num(riskInput.value);

      const scalpR = totalRisk > 0 ? s / totalRisk : 0;
      const swingR = totalRisk > 0 ? w / totalRisk : 0;
      const totalR = scalpR + swingR;

      scalpREl.textContent = (scalpR>=0?'':'-') + Math.abs(scalpR).toFixed(2) + 'R';
      scalpREl.style.color = scalpR > 0 ? 'var(--tj-green)' : scalpR < 0 ? 'var(--tj-red)' : 'var(--tj-text2)';
      swingREl.textContent = (swingR>=0?'':'-') + Math.abs(swingR).toFixed(2) + 'R';
      swingREl.style.color = swingR > 0 ? 'var(--tj-green)' : swingR < 0 ? 'var(--tj-red)' : 'var(--tj-text2)';
      totalREl.textContent = (totalR>=0?'':'-') + Math.abs(totalR).toFixed(2) + 'R';
      totalREl.style.color = totalR > 0 ? 'var(--tj-green)' : totalR < 0 ? 'var(--tj-red)' : 'var(--tj-text)';
    }
    [scalpInput, swing1Input, swing2Input, swing3Input, riskInput].forEach(el=>{
      el.addEventListener('input', syncTotalUsd);
    });
    syncTotalUsd();

    const assessmentEl = form.querySelector('#tj-assessment');
    let aiSetupComment = '';
    let aiSetupLoading = false;
    let aiSetupError = '';

    async function runSetupCheck(){
      aiSetupLoading = true; aiSetupError = ''; aiSetupComment = '';
      renderAssessment();
      try {
        const currentTradeType = tradeTypeSel.value;
        const typeLabel = (KEYS.tradeTypes.find(t=>t.value===currentTradeType) || {}).label || currentTradeType;
        const magnet = form.querySelector('[name=magnet]') ? form.querySelector('[name=magnet]').value : '';
        const signalQuality = form.querySelector('[name=signalQuality]') ? form.querySelector('[name=signalQuality]').value : '';
        const direction = form.querySelector('[name=direction]') ? form.querySelector('[name=direction]').value : '';
        const reasons = Array.from(form.querySelectorAll('input[name=reasons]:checked')).map(b=>b.value);
        const veto = Array.from(form.querySelectorAll('input[name=veto]:checked')).map(b=>b.value);
        const majorReversalConditionsChecked = Array.from(form.querySelectorAll('input[name=majorReversalConditions]:checked')).map(b=>b.value);
        const trendDayTypesChecked = Array.from(form.querySelectorAll('input[name=trendDayTypes]:checked')).map(b=>b.value);
        const criteriaChecked2 = Array.from(form.querySelectorAll('input[name=criteria]:checked')).map(b=>b.value);
        const trendlineBreakSel = form.querySelector('[name=trendlineBreak]');
        const reversalTypeSel2 = form.querySelector('#tj-reversalType');

        function winRateFor(matchFn){
          const m = trades.filter(t=>t.outcome && matchFn(t));
          if (m.length < 3) return null;
          return { winRate: Math.round(m.filter(t=>t.outcome==='win').length / m.length * 100), n: m.length };
        }
        const stats = {
          tradeType: winRateFor(t=>(t.tradeType||'opening_reversal')===currentTradeType),
          magnet: magnet ? winRateFor(t=>t.magnet===magnet) : null,
          signalQuality: signalQuality ? winRateFor(t=>t.signalQuality===signalQuality) : null
        };

        const setup = {
          tradeType: typeLabel, direction, magnet: magnet || undefined, signalQuality: signalQuality || undefined,
          reasons, veto,
          majorReversalConditions: majorReversalConditionsChecked.length ? majorReversalConditionsChecked : undefined,
          trendDayTypes: trendDayTypesChecked.length ? trendDayTypesChecked : undefined,
          criteria: criteriaChecked2.length ? criteriaChecked2 : undefined,
          trendlineBreak: (trendlineBreakSel && trendlineBreakSel.value) ? trendlineBreakSel.value : undefined,
          reversalType: (reversalTypeSel2 && reversalTypeSel2.value) ? reversalTypeSel2.value : undefined
        };

        const { data, error } = await supabase.functions.invoke('check-setup', { body: { setup, stats } });
        if (error) throw error;
        if (data && data.error) throw new Error(data.error);
        aiSetupComment = (data && data.comment) ? data.comment : 'პასუხი ვერ მოვიდა.';
      } catch (err) {
        aiSetupError = 'AI-ს კომენტარის მიღება ვერ მოხერხდა — სცადეთ ისევ. (' + (err.message || 'უცნობი შეცდომა') + ')';
      } finally {
        aiSetupLoading = false;
        renderAssessment();
      }
    }

    const vetoExplanations = {
      'Barb Wire-ში შესვლა': 'Barb Wire — ვიწრო, doji-ებით სავსე რეინჯი; საიმედოა მხოლოდ ბაზრის fade რეინჯის კიდესთან, არა ეს setup.',
      'Doji signal bar': 'Doji Signal Bar — წონასწორობას გამოხატავს კონტროლის ნაცვლად, არასდროს არის კარგი სიგნალი.',
      'TL break არ იყო (countertrend)': 'Countertrend ტრენდლაინის რღვევის გარეშე — სანდო Countertrend პატერნი ამის გარეშე არ არსებობს.',
      'Magnet/დონე არ იყო': 'შესვლა მიზნის/მიზეზის გარეშე — Magnet არ იყო განსაზღვრული.',
      'დღის/რეინჯის შუაში': 'დღის/რეინჯის შუაში ვაჭრობა — დაბალი ალბათობის ზონაა.',
      'რეპორტის დროს ვივაჭრე': 'მაკროეკონომიკური რეპორტის დროს ვაჭრობა — გაზრდილი, არაპროგნოზირებადი ვოლატილობა.',
      'Trend from the Open-ის წინააღმდეგ': 'Trend from the Open-ის საწინააღმდეგოდ — სტატისტიკურად ცუდი გამოსავალია Trendline Break-მდე.',
      '2+ წაგების მერე გავაგრძელე': 'ზედიზედ 2+ წაგების მერე გაგრძელება ცვლილების გარეშე — ჩვეულებრივ ნიშნავს overtrading-ს.',
      'დაგვიანებული FOMO შესვლა': 'დაგვიანებული, FOMO-ზე დაფუძნებული შესვლა — ემოცია განსაზღვრავს setup-ის ხარისხის ნაცვლად.',
      'Stop წესი დავარღვიე': 'Stop-ის წესის დარღვევა — რისკის მართვის უგულებელყოფაა.',
      'Reversal bar overlap-შია (nothing to reverse)': 'Reversal Bar დიდწილად ფარავს წინა ბარებს — რეალურად „არაფერი აქვს რევერსირებისთვის".',
      '1-წუთიანი chart-ის signal-ზე შევედი': '1-წუთიან ჩარტზე Signal-ის აღება — ხშირი, უსარგებლო სტოპ-გააქტიურებები.',
      'ნაადრევად შევედი (Excess არ იყო)': 'ნაადრევი შესვლა Excess-ის გარეშე — მოძრაობა ჯერ არ არის ამოწურული.',
      'წინა თვე Reversal-ებზე წავაგე': 'წინა თვის Reversal-ტიპის ტრეიდებში სუსტი შედეგი — ღირს ამ setup-ის ხელახლა გადახედვა.'
    };

    function computeAssessment(){
      const flags = []; // {level:'red'|'yellow'|'green', text}
      const currentTradeType = tradeTypeSel.value;
      const signalQuality = form.querySelector('[name=signalQuality]') ? form.querySelector('[name=signalQuality]').value : '';
      const magnet = form.querySelector('[name=magnet]') ? form.querySelector('[name=magnet]').value : '';
      const reasonsN = form.querySelectorAll('input[name=reasons]:checked').length;
      const majorBoxes = form.querySelectorAll('input[name=majorReversalConditions]');
      const majorChecked = form.querySelectorAll('input[name=majorReversalConditions]:checked').length;
      const reversalTypeSel = form.querySelector('#tj-reversalType');
      const trendlineBreakSel = form.querySelector('[name=trendlineBreak]');
      const twoLegEndSel = form.querySelector('[name=twoLegEnd]');
      const trendDayBoxes = form.querySelectorAll('input[name=trendDayTypes]:checked');
      const trendDayValues = Array.from(trendDayBoxes).map(b=>b.value);
      const criteriaChecked = form.querySelectorAll('input[name=criteria]:checked').length;
      const directionVal = form.querySelector('[name=direction]') ? form.querySelector('[name=direction]').value : '';
      const alwaysInVal = form.querySelector('[name=alwaysIn]') ? form.querySelector('[name=alwaysIn]').value : '';

      // --- Always In (Al Brooks, Chapter 15: "This might be the single most important concept in trading")
      if (alwaysInVal === 'unclear'){
        flags.push({level:'yellow', text:'Always In გაურკვეველია — ბაზარი Trading Range-შია. Brooks: ასეთ დროს საიმედოა მხოლოდ scalp ან წინა ტრენდის მიმართულებით ვაჭრობა, არა ახალი swing-ის აღება.'});
      } else if (alwaysInVal === 'long' || alwaysInVal === 'short'){
        if (directionVal === alwaysInVal){
          flags.push({level:'green', text:`თქვენი მიმართულება ემთხვევა Always In-ს (${alwaysInVal==='long'?'Long':'Short'}) — Brooks: ასეთი სიგნალები საშუალოდ სულ მცირე 60%-ით საიმედოა.`});
        } else if (currentTradeType !== 'reversal'){
          flags.push({level:'red', text:`თქვენი მიმართულება (${directionVal==='long'?'Long':'Short'}) ეწინააღმდეგება Always In-ს (${alwaysInVal==='long'?'Long':'Short'}), ტრეიდის ტიპი კი არ არის Reversal — Brooks: "It is a costly mistake to keep betting that reversals will be successful, because 80 percent of them are not."`});
        } else {
          flags.push({level:'yellow', text:`Reversal ტრეიდი Always In-ის (${alwaysInVal==='long'?'Long':'Short'}) საწინააღმდეგოდ — ეს არის სწორედ Reversal-ის არსი (Always In-ის ცვლილების დაჭერა), მაგრამ დარწმუნდით, Major Reversal-ის ან შესაბამისი კრიტერიუმები ნამდვილად დაკმაყოფილებულია.`});
        }
      }

      // --- Veto — ყველაზე მძიმე კატეგორია, ყოველი მონიშნული პირობა წითელი დროშაა
      // (გამონაკლისი: "Doji signal bar" veto არ ემატება ცალკე, თუ Signal Quality-შიც უკვე Doji-ა მითითებული —
      // ეს ერთი და იგივე ფაქტია, არა ორი დამოუკიდებელი პრობლემა)
      form.querySelectorAll('input[name=veto]:checked').forEach(box=>{
        if (box.value === 'Doji signal bar' && signalQuality === 'Doji') return;
        flags.push({level:'red', text: vetoExplanations[box.value] || ('Veto: ' + box.value + ' — თქვენ თვითონ მონიშნეთ ეს პირობა.')});
      });

      // --- მიზეზების რაოდენობა
      if (reasonsN === 0) flags.push({level:'red', text:'შესვლის მიზეზი საერთოდ არ გაქვთ მონიშნული.'});
      else if (reasonsN === 1) flags.push({level:'yellow', text:'მხოლოდ 1 მიზეზი გაქვთ მონიშნული — Al Brooks: „Have at Least Two Reasons to Enter a Trade".'});
      else flags.push({level:'green', text: reasonsN + ' მიზეზი მონიშნული — საკმარისია.'});

      // --- Signal Bar ხარისხი (კონტექსტზე დამოკიდებული — Al Brooks: "a doji bar can be
      // an excellent signal bar, depending on context"; ცუდია კონკრეტულად Countertrend-ზე,
      // ხოლო With Trend-ში, "trending dojis"-ის სახით, შეიძლება ტრენდის განგრძობის ნიშანიც იყოს)
      if (signalQuality === 'Doji'){
        if (currentTradeType === 'reversal'){
          flags.push({level:'red', text:'Doji Signal Bar Reversal/Countertrend ტიპის ტრეიდზე — Al Brooks: "Small dojis are rarely ever good Countertrend entry bars." ეს კომბინაცია განსაკუთრებით სუსტია.'});
        } else if (currentTradeType === 'with_trend'){
          flags.push({level:'yellow', text:'Doji Signal Bar With Trend-ზე — თავისთავად სუსტი ნიშანია, მაგრამ Brooks: "trending dojis" (თანმიმდევრული, ტრენდის მიმართულებით მზარდი მაღალი/დაბალი წერტილებით დოჯიები) რეალურად ტრენდის ნიშანი შეიძლება იყოს. თუ დანარჩენი კონტექსტი (EMA, წინა swing) მაინც ცალსახად მხარს უჭერს ტრენდს — ეს ნაკლებად საშიშია, ვიდრე Countertrend-ზე.'});
        } else {
          flags.push({level:'yellow', text:'Doji Signal Bar — ზოგადად სუსტი ნიშანია (წონასწორობას გამოხატავს), თუმცა Brooks-ის მიხედვით კონკრეტულმა კონტექსტმა (მაგ. Failed Final Flag, EMA Gap Bar) შეიძლება ეს კომპენსირება გაუწიოს.'});
        }
      }
      else if (signalQuality === 'საპირისპირო ტრენდული ბარი') flags.push({level:'yellow', text:'Signal Bar საწინააღმდეგო მიმართულების ტრენდულია — Brooks: ეს "შეიძლება იყოს გონივრული Signal Bar, სხვა ფასის მოძრაობაზე დამოკიდებულებით", მაგრამ ზოგადად სუსტია, სანამ თქვენი მხარემ კონტროლი არ დაამტკიცა ამ ბარზე მაინც.'});
      else if (signalQuality === 'სუსტი trend bar') flags.push({level:'yellow', text:'Signal Bar სუსტი trend bar-ია — არაიდეალურია, მაგრამ არა კრიტიკული.'});
      else if (signalQuality === 'ძლიერი trend bar') flags.push({level:'green', text:'Signal Bar ძლიერი trend bar-ია სავაჭრო მიმართულებით.'});

      // --- Opening Reversal (default branch) — Magnet და დამატებითი კრიტერიუმები
      if (currentTradeType !== 'with_trend' && currentTradeType !== 'tr_fade' && currentTradeType !== 'reversal'){
        if (!magnet) flags.push({level:'yellow', text:'Magnet/დონე არ არის მითითებული — შესვლას სჭირდება მიზეზი მიზნისკენ.'});
        if (criteriaChecked === 0) flags.push({level:'yellow', text:'დამატებითი დამადასტურებელი კრიტერიუმი (TL break, Double Top/Bottom, Second entry, Trapped მხარე) არცერთი არ არის მონიშნული.'});
        else flags.push({level:'green', text: criteriaChecked + ' დამადასტურებელი კრიტერიუმი მონიშნულია.'});
      }

      // --- With Trend / TR Fade — დღის ტიპი
      if (currentTradeType === 'with_trend'){
        if (trendDayValues.length === 0) flags.push({level:'yellow', text:'ტრენდის დღის ტიპი არ არის მონიშნული — With Trend საიმედოა მხოლოდ ცნობილი ტრენდული დღის კონტექსტში.'});
        if (trendDayValues.includes('Shrinking Stairs')) flags.push({level:'yellow', text:'Shrinking Stairs — ეს ხშირად მილევადი მომენტუმის ნიშანია, შესაძლოა ტრენდი რევერსალს უახლოვდება.'});
      }
      if (currentTradeType === 'tr_fade'){
        if (trendDayValues.length === 0) flags.push({level:'red', text:'დღის ტიპი არ დაგიდასტურებიათ — TR Fade მხოლოდ ცნობილ Trading Range დღეებში მუშაობს საიმედოდ.'});
        if (twoLegEndSel && twoLegEndSel.value === 'no') flags.push({level:'yellow', text:'ეს არ არის ორფეხიანი მოძრაობის დასასრული — Al Brooks: „ორ ფეხს ელოდე თითქმის ყოველთვის".'});
        else if (twoLegEndSel && twoLegEndSel.value === 'yes') flags.push({level:'green', text:'ორფეხიანი მოძრაობის დასასრულია — უფრო საიმედო fade წერტილია.'});
      }

      // --- Reversal — Trendline Break და Reversal ტიპი
      if (currentTradeType === 'reversal'){
        if (!trendlineBreakSel || trendlineBreakSel.value === ''){
          flags.push({level:'yellow', text:'ტრენდლაინის რღვევა არ არის შემოწმებული.'});
        } else if (trendlineBreakSel.value === 'no'){
          flags.push({level:'red', text:'Trendline Break არ დაფიქსირდა — Al Brooks: „სანდო Countertrend პატერნი არ არსებობს ტრენდლაინის რღვევის გარეშე".'});
        } else {
          flags.push({level:'green', text:'ტრენდლაინის რღვევა დაფიქსირებულია.'});
        }

        if (reversalTypeSel){
          if (reversalTypeSel.value === 'Major Trend Reversal' && majorBoxes.length){
            if (majorChecked < 4) flags.push({level: majorChecked <= 1 ? 'red' : 'yellow', text: `Major Reversal-ის 4 პირობიდან მხოლოდ ${majorChecked} დაკმაყოფილებულია.`});
            else flags.push({level:'green', text:'Major Reversal-ის ყველა 4 პირობა დაკმაყოფილებულია.'});
          } else if (['Climactic Reversal','3 Push','Expanding Triangle','Shrinking Stairs'].includes(reversalTypeSel.value)){
            flags.push({level:'yellow', text:'ეს ერთი ოჯახის პატერნია (Climactic/3 Push/Wedge/Expanding Triangle) — მთავარი დამადასტურებელი სიგნალია Trend Channel Line-ის overshoot და მისი მოცილება.'});
          } else if (reversalTypeSel.value === 'Final Flag Reversal'){
            flags.push({level:'yellow', text:'Final Flag Reversal — თუ ეს ასევე Failed Final Flag-ია (breakout ვერ ამართლებს), სიგნალი მნიშვნელოვნად უფრო საიმედოა.'});
          } else if (reversalTypeSel.value === 'არ ვვაჭრობ Reversal-ზე'){
            flags.push({level:'red', text:'თრეიდის ტიპად „Reversal" გაქვთ არჩეული, მაგრამ Reversal-ის ტიპში მითითებული გაქვთ „არ ვვაჭრობ Reversal-ზე" — გადაამოწმეთ შეუსაბამობა.'});
          }
        }
      }

      // --- ისტორიული სტატისტიკა ამ tradeType-ზე
      const historyMatches = trades.filter(t => (t.tradeType || 'opening_reversal') === currentTradeType && t.outcome);
      const statLines = [];
      if (historyMatches.length >= 5){
        const wins = historyMatches.filter(t=>t.outcome==='win').length;
        const winRate = Math.round((wins / historyMatches.length) * 100);
        const typeLabel = (KEYS.tradeTypes.find(t=>t.value===currentTradeType) || {}).label || currentTradeType;
        statLines.push(`თქვენი ისტორიული Win rate „${typeLabel}"-ზე: <strong>${winRate}%</strong> (${historyMatches.length} ტრეიდი).`);
        if (winRate < 40) flags.push({level:'yellow', text:`ისტორიულად სუსტი შედეგი გაქვთ „${typeLabel}"-ში (${winRate}% Win rate, ${historyMatches.length} ტრეიდზე).`});
      }
      if (magnet){
        const magnetMatches = trades.filter(t => t.magnet === magnet && t.outcome);
        if (magnetMatches.length >= 5){
          const winRate = Math.round((magnetMatches.filter(t=>t.outcome==='win').length / magnetMatches.length) * 100);
          statLines.push(`თქვენი Win rate „${magnet}" Magnet-ით: <strong>${winRate}%</strong> (${magnetMatches.length} ტრეიდი).`);
          if (winRate < 40) flags.push({level:'yellow', text:`ისტორიულად სუსტი შედეგი „${magnet}" Magnet-ით (${winRate}%, ${magnetMatches.length} ტრეიდზე).`});
        }
      }
      if (signalQuality){
        const sqMatches = trades.filter(t => t.signalQuality === signalQuality && t.outcome);
        if (sqMatches.length >= 5){
          const winRate = Math.round((sqMatches.filter(t=>t.outcome==='win').length / sqMatches.length) * 100);
          statLines.push(`თქვენი Win rate „${signalQuality}"-ით: <strong>${winRate}%</strong> (${sqMatches.length} ტრეიდი).`);
        }
      }
      const statLine = statLines.join('<br/>');

      const redCount = flags.filter(f=>f.level==='red').length;
      const yellowCount = flags.filter(f=>f.level==='yellow').length;
      let verdict, verdictColor, verdictBorder, verdictBg;
      if (redCount >= 2 || (redCount>=1 && yellowCount>=2)){
        verdict = 'სუსტი setup — ბევრი წითელი დროშაა'; verdictColor='var(--tj-red)'; verdictBorder='var(--tj-red)'; verdictBg='rgba(189,90,76,0.1)';
      } else if (redCount >= 1 || yellowCount >= 2){
        verdict = 'საშუალო — სიფრთხილე გმართებთ'; verdictColor='var(--tj-amber)'; verdictBorder='var(--tj-amber)'; verdictBg='rgba(201,154,80,0.1)';
      } else {
        verdict = 'ძლიერი setup — კრიტერიუმები დაკმაყოფილებულია'; verdictColor='var(--tj-green)'; verdictBorder='var(--tj-green)'; verdictBg='rgba(79,158,118,0.1)';
      }

      return { verdict, verdictColor, verdictBorder, verdictBg, flags, statLine };
    }

    function dotColor(level){ return level==='red' ? 'var(--tj-red)' : level==='yellow' ? 'var(--tj-amber)' : 'var(--tj-green)'; }

    function renderAssessment(){
      if (!assessmentEl) return;
      const a = computeAssessment();
      assessmentEl.innerHTML = `
        <div style="border:0.5px solid ${a.verdictBorder}; background:${a.verdictBg}; border-radius:10px; padding:14px 16px;">
          <div style="font-size:13px; font-weight:600; color:${a.verdictColor}; margin-bottom:10px;">წინასწარი შეფასება: ${a.verdict}</div>
          <div style="display:flex; flex-direction:column; gap:6px;">
            ${a.flags.map(f=>`
              <div style="display:flex; align-items:flex-start; gap:8px; font-size:12px; color:var(--tj-text2); line-height:1.5;">
                <span style="width:7px; height:7px; border-radius:50%; background:${dotColor(f.level)}; margin-top:5px; flex-shrink:0;"></span>
                <span>${f.text}</span>
              </div>
            `).join('')}
          </div>
          ${a.statLine ? `<div style="margin-top:10px; padding-top:10px; border-top:0.5px solid var(--tj-border); font-size:12px; color:var(--tj-text2);">${a.statLine}</div>` : ''}
          <div style="margin-top:10px; font-size:10.5px; color:var(--tj-text3);">ეს არის ავტომატური, წესებზე დაფუძნებული შეფასება (Al Brooks-ის მეთოდოლოგია) — არა გარანტია. საბოლოო გადაწყვეტილება თქვენია.</div>
          <div style="margin-top:14px; padding-top:14px; border-top:0.5px dashed var(--tj-border);">
            <button type="button" id="tj-ask-ai-setup" ${aiSetupLoading ? 'disabled' : ''} style="padding:7px 14px; border-radius:8px; border:0.5px solid var(--tj-accent); background:rgba(110,147,176,0.14); color:var(--tj-text); font-size:12px; cursor:pointer; ${aiSetupLoading ? 'opacity:0.5; cursor:default;' : ''}">
              ${aiSetupLoading ? 'AI ფიქრობს…' : '🤖 მკითხე AI-ს ამ setup-ზე'}
            </button>
            ${aiSetupError ? `<div style="margin-top:8px; font-size:11.5px; color:var(--tj-red);">${aiSetupError}</div>` : ''}
            ${aiSetupComment ? `<div class="tj-ai-content" style="margin-top:10px; padding:12px 14px; background:var(--tj-panel2); border-radius:8px; font-size:12.5px;">${marked.parse(aiSetupComment)}</div>` : ''}
          </div>
        </div>
      `;
      const askBtn = assessmentEl.querySelector('#tj-ask-ai-setup');
      if (askBtn) askBtn.onclick = runSetupCheck;
    }
    function onAssessmentFieldChange(){ aiSetupComment = ''; aiSetupError = ''; renderAssessment(); }
    form.addEventListener('change', onAssessmentFieldChange);
    form.addEventListener('input', onAssessmentFieldChange);
    renderAssessment();

    form.addEventListener('submit', async (e)=>{
      e.preventDefault();
      const fd = new FormData(form);
      if (fd.getAll('veto').includes('სხვა') && !String(fd.get('vetoOther')||'').trim()){
        msg.style.color = 'var(--tj-red)';
        msg.textContent = 'Veto-ში "სხვა" მონიშნეთ — გთხოვთ ჩაწეროთ დაკონკრეტება.';
        vetoOtherInput.focus();
        return;
      }
      const scalpUsd = num(fd.get('scalpUsd'));
      const swingUsd1 = num(fd.get('swingUsd1'));
      const swingUsd2 = num(fd.get('swingUsd2'));
      const swingUsd3 = num(fd.get('swingUsd3'));
      const swingUsd = swingUsd1 + swingUsd2 + swingUsd3;
      const standardContracts = num(fd.get('standardContracts'));
      const microContracts = num(fd.get('microContracts'));
      const totalRiskUsd = num(fd.get('totalRiskUsd'));
      const scalpR = totalRiskUsd > 0 ? scalpUsd / totalRiskUsd : 0;
      const swingR = totalRiskUsd > 0 ? swingUsd / totalRiskUsd : 0;
      const commission = (standardContracts * DEFAULT_COMMISSION_ROUNDTURN.ES) + (microContracts * DEFAULT_COMMISSION_ROUNDTURN.MES);
      const trade = {
        date: fd.get('date'),
        instrument: fd.get('instrument'),
        accountId: fd.get('accountId') || '',
        direction: fd.get('direction'),
        alwaysIn: fd.get('alwaysIn') || '',
        tradeType: fd.get('tradeType') || 'opening_reversal',
        magnet: fd.get('magnet') || '',
        trendDayTypes: fd.getAll('trendDayTypes'),
        twoLegEnd: fd.get('twoLegEnd') || '',
        signalQuality: fd.get('signalQuality'),
        signalBarPatterns: fd.getAll('signalBarPatterns'),
        reversalType: fd.get('reversalType') || '',
        trendlineBreak: fd.get('trendlineBreak') || '',
        majorReversalConditions: fd.getAll('majorReversalConditions'),
        reasons: fd.getAll('reasons'),
        criteria: fd.getAll('criteria'),
        standardContracts, microContracts, totalRiskUsd,
        partial: fd.get('partial'),
        outcome: fd.get('outcome'),
        scalpR, swingR, totalR: scalpR + swingR,
        scalpUsd, swingUsd1, swingUsd2, swingUsd3, swingUsd, commission,
        totalUsd: scalpUsd + swingUsd - commission,
        veto: fd.getAll('veto'),
        vetoOther: fd.get('vetoOther') || '',
        chartLink: fd.get('chartLink') || '',
        notes: fd.get('notes') || ''
      };
      const msg = form.querySelector('#tj-save-msg');

      if (isEdit){
        const ok = await updateTradeRemote(prefill.id, trade);
        if (ok){
          msg.style.color = 'var(--tj-green)';
          msg.textContent = 'ცვლილებები შენახულია.';
          editingTradeId = null;
          setTimeout(()=>{ tab = 'log'; renderTabs(); renderLog(); }, 600);
        } else {
          msg.style.color = 'var(--tj-red)';
          msg.textContent = 'ვერ შეინახა — სცადეთ ისევ.';
        }
        return;
      }

      trade.id = 'trade_' + Date.now();
      const ok = await addTradeRemote(trade);
      if (ok){
        lastUsedDate = trade.date;
        lastUsedInstrument = trade.instrument;
        lastUsedAccountId = trade.accountId;
        form.reset();
        syncVeto();
        syncVetoOther();
        syncReasonCount();
        syncTotalUsd();
        entryZone.innerHTML = renderEntryCriteriaZone('opening_reversal');
        wireEntryCriteriaZone(null);
        msg.style.color = 'var(--tj-green)';
        msg.textContent = 'შენახულია (' + trades.length + ' ტრეიდი სულ).';
        form.querySelector('[name=date]').value = lastUsedDate;
        form.querySelector('[name=instrument]').value = lastUsedInstrument;
        if (form.querySelector('[name=accountId]')) form.querySelector('[name=accountId]').value = lastUsedAccountId;
        aiSetupComment = ''; aiSetupError = '';
        renderAssessment();
      } else {
        msg.style.color = 'var(--tj-red)';
        msg.textContent = 'ვერ შეინახა — იხილეთ შეტყობინება ზემოთ. მონაცემი ფორმაში დარჩა, სცადეთ ისევ.';
      }
      setTimeout(()=> msg.textContent = '', 4000);
    });
  }

  function num(v){
    const n = Number(v);
    return isNaN(n) ? 0 : n;
  }

  function outcomeColor(o){
    return o==='win' ? 'var(--tj-green)' : o==='loss' ? 'var(--tj-red)' : 'var(--tj-amber)';
  }
  function outcomeLabel(o){
    return o==='win' ? 'Win' : o==='loss' ? 'Loss' : 'BE';
  }

  function backupPanel(){
    return `
      <div style="margin-top:22px; padding-top:16px; border-top:0.5px solid var(--tj-border);">
        <div style="font-size:13px; font-weight:500; margin-bottom:6px;">ბექაფი (ხელით)</div>
        <div style="font-size:12px; color:var(--tj-text2); margin-bottom:10px;">
          თუ storage არასანდოა ამ გარემოში, გამოიყენეთ ეს — ტექსტი დააკოპირეთ და შეინახეთ ცალკე (მაგ. ტექსტურ ფაილში). აღდგენისას ჩასვით ველში და დააჭირეთ „აღდგენა".
        </div>
        <textarea id="tj-backup-area" rows="4" style="${inputStyle()}; font-family:'IBM Plex Mono',monospace; font-size:11px; resize:vertical;" placeholder="JSON აქ გამოჩნდება Export-ის მერე, ან ჩასვით მონაცემი Import-ისთვის"></textarea>
        <div style="margin-top:8px; display:flex; gap:8px;">
          <button id="tj-export-btn" type="button" style="padding:7px 14px; border-radius:8px; border:0.5px solid var(--tj-border); background:transparent; color:var(--tj-text); font-size:12px; cursor:pointer;">Export</button>

  function wireBackupPanel(){
    const area = bodyEl.querySelector('#tj-backup-area');
    const msg = bodyEl.querySelector('#tj-backup-msg');
    bodyEl.querySelector('#tj-export-btn').onclick = () => {
      area.value = exportJson();
      area.select();
      msg.style.color = 'var(--tj-text2)';
      msg.textContent = 'მონიშნულია — Ctrl/Cmd+C დააკოპირეთ.';
    };
    bodyEl.querySelector('#tj-import-btn').onclick = async () => {
      if (!area.value.trim()){ msg.style.color='var(--tj-red)'; msg.textContent='ჯერ ჩასვით JSON.'; return; }
      let parsed;
      try {
        parsed = JSON.parse(area.value);
        if (!Array.isArray(parsed)) throw new Error('არასწორი ფორმატი');
      } catch(e){ msg.style.color='var(--tj-red)'; msg.textContent='ფორმატი არასწორია.'; return; }
      msg.style.color = 'var(--tj-text2)';
      msg.textContent = 'შენახვა მიმდინარეობს…';
      const addedCount = await bulkInsertRemote(parsed);
      if (addedCount > 0){
        msg.style.color = 'var(--tj-green)';
        msg.textContent = 'დაემატა ' + addedCount + ' ტრეიდი (სულ ' + trades.length + ').';
      } else {
        msg.style.color = 'var(--tj-red)';
        msg.textContent = 'ვერ დაემატა — იხილეთ შეტყობინება ზემოთ.';
      }
      renderLog();
    };
  }

        <table style="width:100%; border-collapse:collapse;">

      ${backupPanel()}
    `;
    wireFilterBar(renderLog);
    (function wireDragScroll(){
      const el = bodyEl.querySelector('#tj-log-scroll');
      if (!el) return;
      let isDown = false, startX = 0, startScroll = 0, moved = false;
      el.addEventListener('mousedown', (e)=>{
        isDown = true; moved = false;
        startX = e.pageX; startScroll = el.scrollLeft;
        el.style.cursor = 'grabbing';
      });
      window.addEventListener('mouseup', ()=>{
        isDown = false; el.style.cursor = 'grab';
      });
      window.addEventListener('mousemove', (e)=>{
        if (!isDown) return;
        e.preventDefault();
        const dx = e.pageX - startX;
        if (Math.abs(dx) > 4) moved = true;
        el.scrollLeft = startScroll - dx;
      });
      // drag-ის შემდეგ არ ავამოქმედოთ ღილაკის კლიკი, თუ რეალურად გადავათრიეთ
      el.addEventListener('click', (e)=>{
        if (moved) { e.preventDefault(); e.stopPropagation(); }
      }, true);
    })();
    bodyEl.querySelectorAll('.tj-del').forEach(b=>{

  function renderCalendarSection(dayGroups){
    if (!calendarViewMonth){
      const dates = Object.keys(dayGroups).sort();
      calendarViewMonth = dates.length ? dates[dates.length-1].slice(0,7) : new Date().toISOString().slice(0,7);
    }
    const [yearStr, monthStr] = calendarViewMonth.split('-');
    const year = parseInt(yearStr,10), month = parseInt(monthStr,10);
    const firstOfMonth = new Date(year, month-1, 1);
    const daysInMonth = new Date(year, month, 0).getDate();
    const firstWeekday = (firstOfMonth.getDay()+6)%7; // 0=Mon..6=Sun

    const monthNames = ['იანვარი','თებერვალი','მარტი','აპრილი','მაისი','ივნისი','ივლისი','აგვისტო','სექტემბერი','ოქტომბერი','ნოემბერი','დეკემბერი'];

    let monthTotal = 0, monthTrades = 0;
    for (let d=1; d<=daysInMonth; d++){
      const key = calendarViewMonth + '-' + String(d).padStart(2,'0');
      if (dayGroups[key]) { monthTotal += dayGroups[key].usd; monthTrades += dayGroups[key].count; }
    }

    let cells = '';
    for (let i=0;i<firstWeekday;i++) cells += `<div style="background:transparent; border-radius:6px; min-height:60px;"></div>`;
    for (let d=1; d<=daysInMonth; d++){
      const key = calendarViewMonth + '-' + String(d).padStart(2,'0');
      const info = dayGroups[key];
      let bg = 'var(--tj-panel2)', content = '';
      if (info){
        bg = info.usd > 0 ? 'rgba(79,158,118,0.20)' : info.usd < 0 ? 'rgba(189,90,76,0.20)' : 'var(--tj-panel2)';
        const color = info.usd > 0 ? 'var(--tj-green)' : info.usd < 0 ? 'var(--tj-red)' : 'var(--tj-text2)';
        content = `<div class="tj-mono" style="font-size:11px; font-weight:600; color:${color}; margin-top:6px;">${info.usd>=0?'+':'-'}$${Math.abs(info.usd).toFixed(0)}</div><div style="font-size:9px; color:var(--tj-text3);">${info.count} ტრ.</div>`;
      }
      cells += `<div style="background:${bg}; border-radius:6px; min-height:60px; padding:6px;">
        <div style="font-size:10px; color:var(--tj-text3);">${d}</div>
        ${content}
      </div>`;
    }

    return `
      <div style="margin-bottom:24px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; flex-wrap:wrap; gap:8px;">
          <div style="font-size:13px; font-weight:500;">PnL კალენდარი — <span class="tj-mono" style="color:${monthTotal>=0?'var(--tj-green)':'var(--tj-red)'};">${monthTotal>=0?'+':'-'}$${Math.abs(monthTotal).toFixed(2)}</span> <span style="color:var(--tj-text3); font-size:11px;">(${monthTrades} ტრეიდი)</span></div>
          <div style="display:flex; align-items:center; gap:10px;">
            <button type="button" class="tj-cal-prev" style="border:0.5px solid var(--tj-border); background:var(--tj-panel2); color:var(--tj-text); border-radius:6px; width:26px; height:26px; cursor:pointer;">‹</button>
            <span class="tj-mono" style="font-size:12px; min-width:120px; text-align:center;">${monthNames[month-1]} ${year}</span>
            <button type="button" class="tj-cal-next" style="border:0.5px solid var(--tj-border); background:var(--tj-panel2); color:var(--tj-text); border-radius:6px; width:26px; height:26px; cursor:pointer;">›</button>
          </div>
        </div>
        <div style="display:grid; grid-template-columns:repeat(7,1fr); gap:4px; font-size:10px; color:var(--tj-text3); margin-bottom:4px; text-align:center;">
          <div>ორშ</div><div>სამ</div><div>ოთხ</div><div>ხუთ</div><div>პარ</div><div>შაბ</div><div>კვირა</div>
        </div>
        <div style="display:grid; grid-template-columns:repeat(7,1fr); gap:4px;">
          ${cells}
        </div>
      </div>
    `;
  }

  function weekdayName(dateStr){
    if (!dateStr) return null;
    const d = new Date(dateStr + 'T00:00:00');
    if (isNaN(d)) return null;
    return ['კვირა','ორშ','სამ','ოთხ','ხუთ','პარ','შაბ'][d.getDay()];
  }

  let statsMode = 'total'; // 'total' | 'scalp' | 'swing'
  function sR(t){ return statsMode==='scalp' ? num(t.scalpR) : statsMode==='swing' ? num(t.swingR) : num(t.totalR); }
  function sUsd(t){ return statsMode==='scalp' ? num(t.scalpUsd) : statsMode==='swing' ? num(t.swingUsd) : num(t.totalUsd); }

  function renderStats(){
    let filtered = getFilteredTrades();
    if (trades.length === 0){
      bodyEl.innerHTML = `<div style="padding:40px 0; text-align:center; color:var(--tj-text2); font-size:13px;">ანალიტიკისთვის საჭიროა მინიმუმ ერთი ჩანაწერი.</div>`;
      return;
    }
    if (filtered.length === 0){
      bodyEl.innerHTML = renderFilterBar() + `<div style="padding:40px 0; text-align:center; color:var(--tj-text2); font-size:13px;">ფილტრით ვერაფერი მოიძებნა.</div>`;
      wireFilterBar(renderStats);
      return;
    }
    // scalp/swing რეჟიმში, სრული სურათისთვის, გამოვრიცხავთ ტრეიდებს, სადაც ეს კონკრეტული
    // ნაწილი (scalp ან swing) საერთოდ არ არსებობდა — წინააღმდეგ შემთხვევაში $0-იანი
    // ჩანაწერები ხელოვნურად ავიწროებდა Win Rate-სა და საშუალო მაჩვენებლებს.
    if (statsMode === 'scalp') filtered = filtered.filter(t => num(t.scalpUsd) !== 0 || num(t.scalpR) !== 0);
    else if (statsMode === 'swing') filtered = filtered.filter(t => num(t.swingUsd) !== 0 || num(t.swingR) !== 0);
    if (filtered.length === 0){
      bodyEl.innerHTML = renderFilterBar() + `<div style="padding:40px 0; text-align:center; color:var(--tj-text2); font-size:13px;">ამ რეჟიმში (${statsMode==='scalp'?'სკალპი':'სვინგი'}) ვერცერთი ტრეიდი ვერ მოიძებნა.</div>`;
      wireFilterBar(renderStats);
      return;
    }
    const n = filtered.length;
    const winTrades = filtered.filter(t=>t.outcome==='win');
    const lossTrades = filtered.filter(t=>t.outcome==='loss');
    const wins = winTrades.length, losses = lossTrades.length;
    const winRate = ((wins/n)*100).toFixed(0);
    const totalR = filtered.reduce((s,t)=>s+sR(t),0);
    const avgR = totalR/n;
    const totalUsd = filtered.reduce((s,t)=>s+sUsd(t),0);
    const avgUsd = totalUsd/n;
    const totalScalpUsd = filtered.reduce((s,t)=>s+num(t.scalpUsd),0);
    const totalSwingUsd = filtered.reduce((s,t)=>s+num(t.swingUsd),0);

    const sumPosR = filtered.filter(t=>sR(t)>0).reduce((s,t)=>s+sR(t),0);
    const sumNegR = filtered.filter(t=>sR(t)<0).reduce((s,t)=>s+sR(t),0);
    const profitFactor = sumNegR !== 0 ? (sumPosR/Math.abs(sumNegR)) : (sumPosR>0?Infinity:0);
    const avgWinR = winTrades.length ? winTrades.reduce((s,t)=>s+sR(t),0)/winTrades.length : 0;
    const avgLossR = lossTrades.length ? lossTrades.reduce((s,t)=>s+sR(t),0)/lossTrades.length : 0;
    const bestR = Math.max(...filtered.map(t=>sR(t)));
    const worstR = Math.min(...filtered.map(t=>sR(t)));

    let maxWinStreak=0, maxLossStreak=0, curWin=0, curLoss=0;
    filtered.forEach(t=>{
      if (t.outcome==='win'){ curWin++; curLoss=0; maxWinStreak=Math.max(maxWinStreak,curWin); }
      else if (t.outcome==='loss'){ curLoss++; curWin=0; maxLossStreak=Math.max(maxLossStreak,curLoss); }
      else { curWin=0; curLoss=0; }
    });

    const vetoCounts = {};
    lossTrades.forEach(t=>{
      (t.veto&&t.veto.length? t.veto : ['არცერთი მითითებული']).forEach(v=>{
        vetoCounts[v] = (vetoCounts[v]||0)+1;
      });
    });
    const vetoLabels = Object.keys(vetoCounts);
    const vetoData = vetoLabels.map(k=>vetoCounts[k]);

    // --- დისციპლინის ანალიტიკა: Veto მონიშნული vs არა, Win rate შედარება ---
    const closedForDiscipline = filtered.filter(t=>t.outcome);
    const disciplineWithVeto = closedForDiscipline.filter(t=>t.veto && t.veto.length>0);
    const disciplineNoVeto = closedForDiscipline.filter(t=>!t.veto || t.veto.length===0);
    const disciplineWithVetoWinRate = disciplineWithVeto.length ? Math.round(100*disciplineWithVeto.filter(t=>t.outcome==='win').length/disciplineWithVeto.length) : null;
    const disciplineNoVetoWinRate = disciplineNoVeto.length ? Math.round(100*disciplineNoVeto.filter(t=>t.outcome==='win').length/disciplineNoVeto.length) : null;

    const vetoItemGroups = {};
    closedForDiscipline.forEach(t=>{
      (t.veto||[]).forEach(v=>{
        vetoItemGroups[v] = vetoItemGroups[v] || {win:0,total:0};
        vetoItemGroups[v].total++;
        if (t.outcome==='win') vetoItemGroups[v].win++;

      ${isVisible('equity') ? `

      ${isVisible('monthly') ? `

      ${isVisible('histogram') ? `

      ${isVisible('discipline') && (disciplineWithVetoWinRate!==null || disciplineNoVetoWinRate!==null) ? `
      <div style="margin-bottom:26px;">
        <div style="font-size:13px; font-weight:500; margin-bottom:4px;">დისციპლინის ანალიტიკა — Veto-პირობის გავლენა</div>
        <div style="font-size:11px; color:var(--tj-text2); margin-bottom:12px;">შედარება: ტრეიდები, სადაც Veto პირობა მონიშნული იყო (მაინც შესულხართ), vs ტრეიდები — Veto-ს გარეშე.</div>

          <div style="background:var(--tj-panel); border:0.5px solid var(--tj-green); border-radius:10px; padding:14px 16px;">
            <div style="font-size:11px; color:var(--tj-text2); margin-bottom:4px;">Veto არ იყო მონიშნული</div>
            <div style="font-size:22px; font-weight:600; color:var(--tj-green);">${disciplineNoVetoWinRate!==null ? disciplineNoVetoWinRate+'%' : '—'}</div>

          </div>
        </div>
        ${vetoItemStats.length ? `
        <div style="font-size:11.5px; color:var(--tj-text2); margin-bottom:6px;">კონკრეტული Veto პირობების Win rate (მინ. 3 ტრეიდი, დალაგებული სუსტიდან):</div>
        <div style="display:flex; flex-direction:column; gap:5px;">
          ${vetoItemStats.map(v=>`
            <div style="display:flex; justify-content:space-between; font-size:12px; color:var(--tj-text2); padding:6px 10px; background:var(--tj-panel2); border-radius:6px;">
              <span>${v.key}</span>
              <span style="color:${v.winRate<40?'var(--tj-red)':v.winRate<55?'var(--tj-amber)':'var(--tj-green)'}; font-weight:600;">${v.winRate}% (${v.n})</span>

      </div>` : ''}

      <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(260px,1fr)); gap:24px; margin-bottom:24px;">
        ${isVisible('veto') ? `
        <div>

      ${isVisible('reasons') ? `

        </div>` : ''}
        ${isVisible('trendday') ? `
        <div>
          <div style="font-size:13px; font-weight:500; margin-bottom:8px;">Win rate — ტრენდის დღის ტიპის მიხედვით</div>
          ${trendDayLabels.length
            ? `<div style="position:relative; height:${Math.max(100, trendDayLabels.length*28+30)}px;"><canvas id="tj-trendday"></canvas></div>`

      ${isVisible('twoleg') && twoLegLabels.length ? `
      <div style="margin-bottom:24px;">
        <div style="font-size:13px; font-weight:500; margin-bottom:8px;">TR Fade — Win rate ორფეხიანი მოძრაობის დასასრულის მიხედვით</div>
        <div style="position:relative; height:100px;"><canvas id="tj-twoleg"></canvas></div>
      </div>` : ''}

      <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(260px,1fr)); gap:24px; margin-bottom:24px;">

    wireFilterBar(renderStats);

        renderStats();

    });
    bodyEl.querySelectorAll('.tj-stat-toggle').forEach(cb=>{
      cb.addEventListener('change', ()=>{
        statsVisible[cb.dataset.section] = cb.checked;
        persistStatsVisible();
        renderStats();
      });
    });
    const calPrevBtn = bodyEl.querySelector('.tj-cal-prev');
    const calNextBtn = bodyEl.querySelector('.tj-cal-next');
    function shiftCalendarMonth(delta){
      const [y,m] = calendarViewMonth.split('-').map(Number);
      const d = new Date(y, m-1+delta, 1);
      calendarViewMonth = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
      renderStats();
    }
    if (calPrevBtn) calPrevBtn.onclick = () => shiftCalendarMonth(-1);
    if (calNextBtn) calNextBtn.onclick = () => shiftCalendarMonth(1);

    if (!window.Chart){
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js';
      s.onload = drawCharts;
      document.body.appendChild(s);
    } else {
      drawCharts();
    }

    function drawCharts(){
      const gridColor = '#2E343B';
      const textColor = '#9B9993';
      const baseBar = { indexAxis:'y', responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}} };

      function mkChart(id, config){
        const el = document.getElementById(id);
        if (!el) return;
        new Chart(el, config);
      }

      mkChart('tj-equity', {
        type: 'line',
        data: { labels: filtered.map((_,i)=>i+1), datasets: [{
          data: equitySeries, borderColor: '#6E93B0', backgroundColor: 'rgba(110,147,176,0.12)',
          fill: true, tension: 0.15, pointRadius: 2, pointBackgroundColor: '#6E93B0', borderWidth: 2
        }]},
        options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
          scales: { x:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10}}}, y:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10}}} } }
      });

      mkChart('tj-equity-usd', {
        type: 'line',
        data: { labels: filtered.map((_,i)=>i+1), datasets: [{
          data: equityUsdSeries, borderColor: '#4F9E76', backgroundColor: 'rgba(79,158,118,0.12)',
          fill: true, tension: 0.15, pointRadius: 2, pointBackgroundColor: '#4F9E76', borderWidth: 2
        }]},
        options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
          scales: { x:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10}}}, y:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10},callback:v=>'$'+v}} } }
      });

      mkChart('tj-daily-cum', {
        type: 'line',
        data: { labels: dailyCumLabels, datasets: [{
          data: dailyCumData, borderColor: '#4F9E76', backgroundColor: 'rgba(79,158,118,0.15)',
          fill: true, tension: 0.15, pointRadius: 1, pointBackgroundColor: '#4F9E76', borderWidth: 2
        }]},
        options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
          scales: { x:{grid:{display:false},ticks:{color:textColor,font:{size:9},maxRotation:0,autoSkip:true,maxTicksLimit:6}}, y:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10},callback:v=>'$'+v}} } }
      });

      mkChart('tj-daily-net', {
        type: 'bar',
        data: { labels: dailyCumLabels, datasets:[{ data: dailyNetData, backgroundColor: dailyNetData.map(v=>v>=0?'#4F9E76':'#BD5A4C'), borderRadius:3 }]},
        options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
          scales: { x:{grid:{display:false},ticks:{color:textColor,font:{size:9},maxRotation:0,autoSkip:true,maxTicksLimit:6}}, y:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10},callback:v=>'$'+v}} } }
      });

      mkChart('tj-month-r', {
        type: 'bar',
        data: { labels: monthLabels, datasets:[{ data: monthRData, backgroundColor: monthRData.map(v=>v>=0?'#4F9E76':'#BD5A4C'), borderRadius:4 }]},
        options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
          scales: { x:{grid:{display:false},ticks:{color:textColor,font:{size:10}}}, y:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10},callback:v=>v+'R'}} } }
      });

      mkChart('tj-month-usd', {
        type: 'bar',
        data: { labels: monthLabels, datasets:[{ data: monthUsdData, backgroundColor: monthUsdData.map(v=>v>=0?'#4F9E76':'#BD5A4C'), borderRadius:4 }]},
        options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
          scales: { x:{grid:{display:false},ticks:{color:textColor,font:{size:10}}}, y:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10},callback:v=>'$'+v}} } }
      });

      mkChart('tj-hist', {
        type: 'bar',
        data: { labels: histLabels, datasets:[{ data: histData, backgroundColor:'#6E93B0', borderRadius:4 }]},
        options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
          scales: { x:{grid:{display:false},ticks:{color:textColor,font:{size:10}}}, y:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10},precision:0}} } }
      });

      mkChart('tj-veto', {
        type: 'bar',
        data: { labels: vetoLabels, datasets:[{ data: vetoData, backgroundColor:'#BD5A4C', borderRadius:4 }]},
        options: { ...baseBar, scales: { x:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10},precision:0}}, y:{grid:{display:false},ticks:{color:textColor,font:{size:11}}} } }
      });

      mkChart('tj-magnet', {
        type: 'bar',
        data: { labels: magnetLabels, datasets:[{ data: magnetRates, backgroundColor:'#4F9E76', borderRadius:4 }]},
        options: { ...baseBar, scales: { x:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10},callback:v=>v+'%'},max:100}, y:{grid:{display:false},ticks:{color:textColor,font:{size:11}}} } }
      });

      mkChart('tj-reasons', {
        type: 'bar',
        data: { labels: reasonLabels, datasets:[{ data: reasonRates, backgroundColor:'#6E93B0', borderRadius:4 }]},
        options: { ...baseBar, scales: { x:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10},callback:v=>v+'%'},max:100}, y:{grid:{display:false},ticks:{color:textColor,font:{size:10}}} } }
      });

      mkChart('tj-tradetype', {
        type: 'bar',
        data: { labels: typeLabels, datasets:[{ data: typeRates, backgroundColor:'#6E93B0', borderRadius:4 }]},
        options: { ...baseBar, scales: { x:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10},callback:v=>v+'%'},max:100}, y:{grid:{display:false},ticks:{color:textColor,font:{size:11}}} } }
      });

      if (reversalTypeLabels.length){
        mkChart('tj-reversaltype', {
          type: 'bar',
          data: { labels: reversalTypeLabels, datasets:[{ data: reversalTypeRates, backgroundColor:'#C99A50', borderRadius:4 }]},
          options: { ...baseBar, scales: { x:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10},callback:v=>v+'%'},max:100}, y:{grid:{display:false},ticks:{color:textColor,font:{size:10}}} } }
        });
      }

      if (trendDayLabels.length){
        mkChart('tj-trendday', {
          type: 'bar',
          data: { labels: trendDayLabels, datasets:[{ data: trendDayRates, backgroundColor:'#4F9E76', borderRadius:4 }]},
          options: { ...baseBar, scales: { x:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10},callback:v=>v+'%'},max:100}, y:{grid:{display:false},ticks:{color:textColor,font:{size:10}}} } }
        });
      }

      if (twoLegLabels.length){
        mkChart('tj-twoleg', {
          type: 'bar',
          data: { labels: twoLegLabels, datasets:[{ data: twoLegRates, backgroundColor:'#C99A50', borderRadius:4 }]},
