        });
      }

      mkChart('tj-direction', {
        type: 'bar',
        data: { labels: dirLabels, datasets:[{ data: dirRates, backgroundColor:'#C99A50', borderRadius:4 }]},
        options: { ...baseBar, scales: { x:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10},callback:v=>v+'%'},max:100}, y:{grid:{display:false},ticks:{color:textColor,font:{size:11}}} } }
      });

      mkChart('tj-signalq', {
        type: 'bar',
        data: { labels: sqLabels, datasets:[{ data: sqRates, backgroundColor:'#C99A50', borderRadius:4 }]},
        options: { ...baseBar, scales: { x:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10},callback:v=>v+'%'},max:100}, y:{grid:{display:false},ticks:{color:textColor,font:{size:11}}} } }
      });

      mkChart('tj-weekday', {
        type: 'bar',
        data: { labels: wdLabels, datasets:[{ data: wdRates, backgroundColor:'#6E93B0', borderRadius:4 }]},
        options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
          scales: { x:{grid:{display:false},ticks:{color:textColor,font:{size:11}}}, y:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10},callback:v=>v+'%'},max:100} } }
      });
    }
  }

  function guideSection(title, body){
    return `<div style="margin-bottom:22px;">
      <div style="font-size:14px; font-weight:600; color:var(--tj-accent); margin-bottom:6px;">${title}</div>
      <div style="font-size:13px; color:var(--tj-text2); line-height:1.75;">${body}</div>
    </div>`;
  }

  function renderGuide(){
    bodyEl.innerHTML = `
      <div class="tj-serif" style="font-size:18px; font-weight:600; margin-bottom:18px;">ინსტრუქცია</div>

      ${guideSection('1. ახალი ტრეიდი', `
        აირჩიეთ <b style="color:var(--tj-text);">თრეიდის ტიპი</b> (Opening Reversal / With Trend / TR Fade) — ამის მიხედვით იცვლება ქვემოთ მოთხოვნილი ველები.
        <br>ყოველთვის მონიშნეთ მინიმუმ ორი <b style="color:var(--tj-text);">შესვლის მიზეზი</b> — მთვლელი გაწვანდება, როცა საკმარისი მიზეზი გექნებათ.
        <br>თუ შედეგი „Loss"-ია, გამოჩნდება დამატებითი Veto ბლოკი — მონიშნეთ, რომელი წესი დაირღვა, რომ მოგვიანებით ანალიტიკაში დაინახოთ განმეორებადი შეცდომები.
      `)}

  function updateProgressDOM(){
    const fill = bodyEl.querySelector('#tj-progress-fill');
    const pctEl = bodyEl.querySelector('#tj-progress-pct');
    const labelEl = bodyEl.querySelector('#tj-progress-label');
    if (fill) fill.style.width = aiProgressPct.toFixed(0) + '%';
    if (pctEl) pctEl.textContent = aiProgressPct.toFixed(0) + '%';
    if (labelEl) labelEl.textContent = aiProgressSteps[Math.min(Math.floor(aiProgressPct / (100 / aiProgressSteps.length)), aiProgressSteps.length - 1)];
  }

  function startAiProgress(){
    aiProgressPct = 0;
    if (aiProgressTimer) clearInterval(aiProgressTimer);
    aiProgressTimer = setInterval(() => {
      // ნელი, ექსპონენციალური მიახლოება 92%-კენ — გათვლილია ~60 წამიან ლოდინზე,
      // ისე რომ ზოლი არასდროს "გაჩერდეს" ან არასდროს მიაღწიოს 92%-ს ნამდვილ პასუხამდე
      const remaining = 92 - aiProgressPct;
      aiProgressPct = Math.min(92, aiProgressPct + remaining * 0.022);
      updateProgressDOM();
    }, 450);
  }

  function stopAiProgress(){
    if (aiProgressTimer) { clearInterval(aiProgressTimer); aiProgressTimer = null; }
  }

  function statsByField(list, keyFn){
    const map = {};
    list.forEach(t=>{
      const k = keyFn(t);
      if (k===undefined || k===null || k==='' || !t.outcome) return;
      if (!map[k]) map[k] = { wins:0, losses:0, total:0, sumR:0 };
      map[k].total++;
      if (t.outcome==='win') map[k].wins++; else if (t.outcome==='loss') map[k].losses++;
      if (typeof t.totalR === 'number') map[k].sumR += t.totalR;
    });
    return Object.entries(map).map(([k,v])=>({
      key:k, total:v.total, wins:v.wins, losses:v.losses,
      winRate: v.total ? Math.round(v.wins/v.total*100) : null,
      avgR: v.total ? +(v.sumR/v.total).toFixed(2) : null
    })).sort((a,b)=>b.total-a.total);
  }

  function statsByArrayField(list, arrKey){
    const map = {};
    list.forEach(t=>{
      if (!t.outcome) return;
      (t[arrKey]||[]).forEach(v=>{
        if (!map[v]) map[v] = { wins:0, losses:0, total:0 };
        map[v].total++;
        if (t.outcome==='win') map[v].wins++; else if (t.outcome==='loss') map[v].losses++;
      });
    });
    return Object.entries(map).map(([k,v])=>({
      key:k, total:v.total, wins:v.wins, losses:v.losses,
      winRate: v.total ? Math.round(v.wins/v.total*100) : null
    })).sort((a,b)=>b.total-a.total);
  }

  function buildTradeStatsSummary(list){
    const closed = list.filter(t=>t.outcome);
    const wins = closed.filter(t=>t.outcome==='win').length;
    const losses = closed.filter(t=>t.outcome==='loss').length;
    const winSumR = closed.filter(t=>t.outcome==='win').reduce((s,t)=>s+(typeof t.totalR==='number'?t.totalR:0),0);
    const lossSumR = closed.filter(t=>t.outcome==='loss').reduce((s,t)=>s+(typeof t.totalR==='number'?t.totalR:0),0);
    const totalR = winSumR + lossSumR;
    const profitFactor = lossSumR !== 0 ? +(Math.abs(winSumR/lossSumR)).toFixed(2) : null;
    const dates = list.map(t=>t.date).filter(Boolean).sort();
    const instruments = [...new Set(list.map(t=>t.instrument).filter(Boolean))];

    const withVeto = closed.filter(t=>t.veto && t.veto.length>0);
    const noVeto = closed.filter(t=>!t.veto || t.veto.length===0);

    return {
      totalTrades: list.length,
      closedTrades: closed.length,
      wins, losses,
      winRateOverall: closed.length ? Math.round(wins/closed.length*100) : null,
      totalR: +totalR.toFixed(2),
      profitFactor,
      dateRange: dates.length ? { from: dates[0], to: dates[dates.length-1] } : null,
      instruments,
      byTradeType: statsByField(list, t=>{
        const tt = KEYS.tradeTypes.find(x=>x.value===(t.tradeType||'opening_reversal'));
        return tt ? tt.label : (t.tradeType||'opening_reversal');
      }),
      byMagnet: statsByField(list, t=>t.magnet),
      bySignalQuality: statsByField(list, t=>t.signalQuality),
      byReversalType: statsByField(list, t=>t.reversalType),
      byTrendDayType: statsByArrayField(list, 'trendDayTypes'),
      byVetoItem: statsByArrayField(list, 'veto'),
      byReasonItem: statsByArrayField(list, 'reasons'),
      vetoOverall: {
        withVeto: { total: withVeto.length, winRate: withVeto.length ? Math.round(withVeto.filter(t=>t.outcome==='win').length/withVeto.length*100) : null },
        noVeto: { total: noVeto.length, winRate: noVeto.length ? Math.round(noVeto.filter(t=>t.outcome==='win').length/noVeto.length*100) : null }
      }
    };
  }

  async function callAnalyzeTrades(list, attempt){
    const stats = buildTradeStatsSummary(list);
    const { data, error } = await supabase.functions.invoke('analyze-trades', {
      body: { stats }
    });
    if (error) {
      // FunctionsHttpError-ს აქვს .context (Response ობიექტი) — იქიდან ვცდილობთ
      // რეალური, კონკრეტული შეცდომის ტექსტის ამოღებას
      let detail = error.message || '';
      try {
        if (error.context && typeof error.context.json === 'function'){
          const body = await error.context.clone().json();
          if (body && body.error) detail = body.error;
        }
      } catch(e) { /* JSON ვერ წაიკითხა — ვჯერდებით ძირითად message-ს */ }
      const status = error.context && error.context.status ? error.context.status : null;
      const err = new Error(detail);
      err.status = status;
      throw err;
    }
    if (data && data.error) throw new Error(data.error);
    return (data && data.analysis) ? data.analysis : 'პასუხი ვერ მოვიდა.';
  }

  async function runAiAnalysis(){
    const list = getFilteredTrades();
    if (list.length === 0){
      aiError = 'ანალიზისთვის საჭიროა მინიმუმ ერთი ტრეიდი — ამჟამინდელი ფილტრით არცერთი ტრეიდი არ მოიძებნა.';
      aiResult = '';
      renderAI();
      return;
    }
    aiLoading = true;
    aiError = '';
    aiResult = '';
    renderAI();
    startAiProgress();
    const maxAttempts = 2;
    let lastErr = null;
    for (let attempt = 1; attempt <= maxAttempts; attempt++){
      try {
        aiResult = await callAnalyzeTrades(list, attempt);
        stopAiProgress();
        aiProgressPct = 100;
        updateProgressDOM();
        await new Promise(r => setTimeout(r, 350));
        lastErr = null;
        break;
      } catch (err) {
        lastErr = err;
        // 546 (რესურსის ლიმიტი) და ქსელური ხარვეზები ხშირად დროებითია — ავტომატურად ვცდით ხელახლა
        const isRetryable = err.status === 546 || err.status === 504 || err.status === 502 || err.status === 500 || err.status === 429 || err.status === 529 || !err.status;
        if (attempt < maxAttempts && isRetryable){
          const labelEl = bodyEl.querySelector('#tj-progress-label');
          if (labelEl) labelEl.textContent = `დროებითი ხარვეზი — ვცდით ხელახლა (${attempt}/${maxAttempts - 1})…`;
          await new Promise(r => setTimeout(r, 1200));
          continue;
        }
      }
    }
    if (lastErr){
      stopAiProgress();
      const statusPart = lastErr.status ? ` [კოდი: ${lastErr.status}]` : '';
      aiError = 'ანალიზის მიღება ვერ მოხერხდა რამდენიმე ცდის შემდეგაც — სცადეთ ცოტა ხანში ისევ. (' + (lastErr.message || 'უცნობი შეცდომა') + statusPart + ')';
    }
    aiLoading = false;
    renderAI();
  }

          ['no','არა / ჯერ ბუნდოვანია','შებრუნება მხოლოდ ფასის ადგილმდებარეობით ჩანს, სტრუქტურული მტკიცებულების გარეშე — ასეთი მცდელობების ~80% მარცხდება და ღრმა Pullback-ად სრულდება.']
        ], showIf: a => a.state18 === 'reversed' },
        { key:'day_range', q:'დღის აქამდელი დიაპაზონი საშუალო დღიურ დიაპაზონთან (ADR) შედარებით:', options:[
          ['small','საშუალოზე მცირეა','დღის High-Low მანძილი ADR-ზე შესამჩნევად ჩამორჩება — ბაზრები ADR-ის „შესავსებად" ხშირად გვიან Breakout-ს აკეთებენ; გაფართოების ალბათობა მომატებულია.'],
          ['normal','ჩვეულებრივი ან დიდია','დღემ ADR უკვე აითვისა — გვიანი დიდი გაფართოების „საწვავი" ნაკლებია; დარჩენილი დღე უფრო სქალპურ რეჟიმს ერგება.']
        ], showIf: a => a.state18 === 'side_tight' || a.state18 === 'side_broad' },
      ]
    },
  ];

  function dgVisibleQuestions(cp, cpAnswers){
    return cp.questions.filter(q => !q.showIf || q.showIf(cpAnswers || {}));
  }

  function dgIsTrend(v){ return v === 'trend_up' || v === 'trend_down'; }
  function dgDirWord(v){
    if (v === 'up' || v === 'trend_up') return 'ზემოთ';
    if (v === 'down' || v === 'trend_down') return 'ქვემოთ';
    return '';
  }
  // დღის ტრენდის მიმართულება ბოლო ცნობილი მდგომარეობით
  function dgTrendDir(all){
    const a2 = all.cp2 || {}, a3 = all.cp3 || {};
    if (dgIsTrend(a3.state12)) return a3.state12 === 'trend_up' ? 'up' : 'down';
    if (dgIsTrend(a2.state6)) return a2.state6 === 'trend_up' ? 'up' : 'down';
    return null;
  }

  // ერთი checkpoint-ის გზამკვლევი. მესამე არგუმენტად სრული answers ობიექტი
  // მოდის, რომ checkpoint-ებმა ერთმანეთის კონტექსტიც გაითვალისწინონ.
  function computeCheckpointGuidance(cpKey, a, all){
    const flags = [];
    const cp1 = (all && all.cp1) || {};

    if (cpKey === 'cp1'){
      if (a.report === 'yes') flags.push({level:'red', text:'რეპორტის ზუსტ მომენტში ვაჭრობა სარისკოა — კომპიუტერებს სიახლის დამუშავებაში დიდი უპირატესობა აქვთ. დაელოდეთ 1-2 ბარს, სანამ მიმართულება ცხადი გახდება.'});

      const gDir = a.gap_dir === 'up' ? 'ზემოთ' : 'ქვემოთ';
      if (a.gap_dir === 'none'){
        flags.push({level:'neutral', text:'Gap პრაქტიკულად არ არის — გახსნა გუშინდელი დახურვის სიახლოვესაა. ასეთ დღეებზე პირველი საათი, როგორც წესი, Opening Reversal-ების დროა: დღის High ან Low ~50%-ში პირველ 5 ბარში ყალიბდება, ხოლო Opening Range-ში — ~90%-ში.'});
      } else if (a.gap_size === 'small'){
        flags.push({level:'neutral', text:`მცირე Gap ${gDir} — ხშირად პირველივე ბარებში იხურება და Breakout-ის ძალა არ აქვს. დღეს ისე მოექეცით, თითქოს Gap არ ყოფილა: პირველი საათის Opening Reversal-ლოგიკა ძალაშია.`});
      } else if (a.gap_size === 'moderate'){
        flags.push({level:'yellow', text:`საშუალო Gap ${gDir} ხშირად დღის High-ის ან Low-ის სიახლოვეს იხსნება — პირველი ბარი ხშირად ტრენდის მიმართულებაზე მიუთითებს. თუ პირველი ბარი ძლიერი ტრენდული ბარია, მისი გარღვევა ამ მიმართულებით ლეგიტიმური ადრეული სიგნალია.`});
      } else if (a.gap_size === 'large'){
        flags.push({level:'yellow', text:`დიდი Gap ${gDir} ფაქტობრივად Breakout-ია — მოექეცით როგორც ერთბარიან Spike-ს. ტრენდული დღის ალბათობა მაღალია ორივე მიმართულებით (Gap-ის მიმართულებით ~60/40). ხშირად ბაზარი ჯერ გახსნის დონეს ტესტავს (Double Bottom/Top გახსნასთან) და მერე იწყებს ტრენდს — ამ ტესტზე შესვლა ხშირად საუკეთესო ადგილია.`});
      } else if (a.gap_size === 'huge'){
        flags.push({level:'red', text:`უზარმაზარი Gap ${gDir} (&gt;1%) — ექსტრემალური სიტუაცია. ორი სცენარია: (1) თუ ადრეული რევერსალი არ მოხდა, დღე ხშირად ძლიერ ტრენდად იქცევა და ექსტრემუმთან იხურება — ნუ დაუპირისპირდებით მას „ძალიან შორსაა" ლოგიკით; (2) თუ Gap-ის მიმართულებით მყისიერი გაგრძელება არ ჩანს, ბაზარი სწრაფად შებრუნდება ექსტრემის გასაუქმებლად. პირველი 2-3 ბარი გადამწყვეტია.`});
      }

      if (a.open_vs_yday === 'above'){
        flags.push({level:'neutral', text:'ფასი გუშინდელი High-ის ზემოთაა — Breakout-ტერიტორია. გუშინდელი High ქვემოდან Magnet-ია: მისი წარმატებული ტესტი (Breakout Test) ბულებისთვის ძლიერი შესვლაა; დიაპაზონში ჩაბრუნება კი Failed Breakout — ბეარების საწვავი.'});
      } else if (a.open_vs_yday === 'below'){
        flags.push({level:'neutral', text:'ფასი გუშინდელი Low-ის ქვემოთაა — Breakout-ტერიტორია. გუშინდელი Low ზემოდან Magnet-ია: მისი წარმატებული ტესტი (Breakout Test) ბეარებისთვის ძლიერი შესვლაა; დიაპაზონში აბრუნება კი Failed Breakout — ბულების საწვავი.'});
      } else if (a.open_vs_yday === 'inside'){
        flags.push({level:'neutral', text:'ფასი გუშინდელი დიაპაზონის შიგნითაა — გუშინდელი High და Low ორივე მხრიდან Magnet-ია და დღის ადრეული მოძრაობები ხშირად მათკენ მიემართება. ეს დონეები დღის მთელ განმავლობაში ორიენტირებად დაიჭირეთ.'});
      }

      const gapBig = a.gap_size === 'large' || a.gap_size === 'huge';
      const bar1Aligned = (a.gap_dir === 'up' && a.bar1 === 'bull') || (a.gap_dir === 'down' && a.bar1 === 'bear');
      const bar1Against = (a.gap_dir === 'up' && a.bar1 === 'bear') || (a.gap_dir === 'down' && a.bar1 === 'bull');
      if (gapBig && bar1Aligned){
        flags.push({level:'green', text:`დიდი Gap + ძლიერი ტრენდული პირველი ბარი Gap-ის მიმართულებით: ~50%+ შანსია, რომ პირველი ბარი დღის ექსტრემი აღმოჩნდეს და დღე ${dgDirWord(a.gap_dir)} ტრენდად ჩამოყალიბდეს. მაინც დაელოდეთ დამადასტურებელ ბარს ან პირველ Pullback-ს — პირველივე გარღვევაზე ავტომატურად ნუ შეხვალთ.`});
      } else if (gapBig && bar1Against){
        flags.push({level:'yellow', text:'დიდი Gap-ის საწინააღმდეგო ძლიერი პირველი ბარი — Failed Breakout-ის და Gap Reversal-ის ადრეული ნიშანი. დიდი Gap-ების ~40% სწორედ საწინააღმდეგო ტრენდად სრულდება; თუ მომდევნო ბარებიც ამ მიმართულებას დაადასტურებენ, Trend from the Open შესაძლოა Gap-ის საწინააღმდეგოდ განვითარდეს.'});
      } else if ((a.bar1 === 'bull' || a.bar1 === 'bear') && !gapBig){
        flags.push({level:'yellow', text:`ძლიერი ${a.bar1==='bull'?'ბულ':'ბეარ'} პირველი ბარი ჩანს, თუმცა დიდი Gap-ის გარეშე ის ხშირად ხაფანგია საწინააღმდეგო მხარისთვის. Trend from the Open მხოლოდ დღეების ~20%-ია — პირველ საათში Reversal-ები ბევრად ხშირია. დაელოდეთ მე-2/მე-3 ბარის დადასტურებას.`});
      } else if (a.bar1 === 'weak'){
        flags.push({level:'neutral', text:'პირველი ბარი სუსტია — მიმართულებაზე ჯერ ცოტა ინფორმაცია გვაქვს. საჭიროა მეტი დაკვირვება მომდევნო ბარებზე.'});
      }

      if (a.whipsaw === 'yes'){
        flags.push({level:'yellow', text:'ფასმა უკვე ორივე მხარეს სცადა პირველ სამ ბარში — ადრეული არასტაბილურობის ნიშანი. სავარაუდოდ საწყისი Trading Range ან Barb Wire ყალიბდება. მოთმინება — Barb Wire-ში შესვლა თქვენი Veto-სიაშიცაა.'});
      }
    }

    if (cpKey === 'cp2'){
      if (dgIsTrend(a.state6)){
        const dir = dgDirWord(a.state6);
        const gapConflict = (cp1.gap_dir === 'up' && a.state6 === 'trend_down') || (cp1.gap_dir === 'down' && a.state6 === 'trend_up');
        if (gapConflict && (cp1.gap_size === 'large' || cp1.gap_size === 'huge')){
          flags.push({level:'yellow', text:`ტრენდი ${dir} ვითარდება დიდი Gap-ის საწინააღმდეგოდ — Gap Reversal სცენარი. Failed Breakout გახსნაზე ამ ტრენდის ძლიერი საწვავია: ასეთი დღეები ხშირად სრულფასოვან Trend from the Open დღეებად იქცევა ახალი მიმართულებით.`});
        }
        if (a.nopause === 'yes') flags.push({level:'yellow', text:`4+ ბარიანი Spike ${dir}, პაუზის გარეშე — ძლიერი საწყისი იმპულსი, რომელიც ხშირად Spike and Channel დღედ ვითარდება. Spike-ის შემდეგ პირველ Pullback-ზე შესვლა, როგორც წესი, მინიმუმ სქალპად ამართლებს.`});
        if (a.pullback_size === 'small') flags.push({level:'green', text:'პირველი Pullback მცირეა — Small Pullback Trend Day-ის ნიშანი, ყველაზე ძლიერი ტიპის ტრენდი. განაგრძეთ With-Trend შესვლების ძებნა ყოველ მცირე უკუსვლაზე. გაითვალისწინეთ: ასეთ დღეს სიგნალ ბარები ხშირად „ცუდად" გამოიყურება — ეს ნორმალურია, ძლიერ ტრენდში სუსტი გარეგნობის Flag-ებიც მუშაობს.'});
        else if (a.pullback_size === 'serious') flags.push({level:'yellow', text:'პირველი Pullback-მა Trendline გაარღვია — პირველი გარღვევა ხშირად მარცხდება და ტრენდი გრძელდება, მაგრამ ტესტს დააკვირდით: თუ ექსტრემის ტესტი სუსტია (Lower High / Higher Low), დღემ შეიძლება ტიპი შეიცვალოს.'});
        else if (a.pullback_size === 'none' && a.nopause === 'no') flags.push({level:'neutral', text:'მიმართულება ჩანს, მაგრამ არც მკაფიო Spike ყოფილა და არც Pullback — სურათი ჯერ ყალიბდება. პირველი Pullback-ის ხარისხი (მცირე თუ ღრმა) ბევრს გეტყვით დღის ძალაზე.'});
        if (a.ema === 'one_side') flags.push({level:'green', text:'ფასი EMA-ს ერთ მხარესაა და არც უტესტავს — ტრენდის განსაკუთრებული სიძლიერის ნიშანი. სანამ EMA-ს პირველი ტესტი არ მოხდება, Countertrend ფიქრიც კი ზედმეტია; პირველი EMA-ტესტი კი თავად იქცევა ხოლმე With-Trend შესვლად.'});
        else if (a.ema === 'crossing') flags.push({level:'yellow', text:'ფასი EMA-ს ხშირად კვეთს — „ტრენდი", რომელიც EMA-ს ვერ შორდება, რეალურად სუსტია ან Trading Range-ია. With-Trend სიგნალებზე მოთხოვნები აამაღლეთ და ზომა შეამცირეთ.'});
      } else if (a.state6 === 'tight'){
        if (cp1.gap_size === 'large' || cp1.gap_size === 'huge'){
          flags.push({level:'green', text:`ვიწრო არეალი დიდი Gap-ის დღეზე — შესანიშნავი Breakout Mode პატერნი. Gap-მა ბაზარი უკვე „დატენა"; ვიწრო Opening Range-ის გარღვევა ხშირად ძლიერ ტრენდს იწყებს (უპირატესობა Gap-ის მიმართულებას — ${dgDirWord(cp1.gap_dir)}). შედით გარღვევის მიმართულებით, ნუ ივაჭრებთ არეალის შიგნით.`});
        } else {
          flags.push({level:'neutral', text:'ვიწრო საწყისი არეალი Breakout Mode-ია — ორივე მხარე ღიაა. თუ Opening Range საშუალო დღიური დიაპაზონის &lt;25%-ია, გარღვევა ხშირად ტრენდულ დღეს იწყებს; თუ ~50%-ია — უფრო Trending Trading Range Day-ს ელოდეთ. არეალის შიგნით ნუ ივაჭრებთ, დაელოდეთ გარღვევას ან მის Pullback-ს.'});
        }
      } else if (a.state6 === 'choppy'){
        flags.push({level:'red', text:'ბაზარი ორივე მხარეს ბობოქრობს — Trading Range-ის გახსნაა, შესაძლოა Barb Wire. ახალი Swing-ის ნაცვლად მხოლოდ Fade-ლოგიკა მუშაობს არეალის კიდეებთან, ისიც ძლიერი Signal Bar-ით. ხშირად საუკეთესო გადაწყვეტილება უბრალოდ ლოდინია.'});
      }
    }

    if (cpKey === 'cp3'){
      if (dgIsTrend(a.state12)){
        const dir = dgDirWord(a.state12);
        if (a.counter_spike === 'yes') flags.push({level:'red', text:'ერთ-ერთი ყველაზე მნიშვნელოვანი ადრეული გაფრთხილება — უკუსვლას ძლიერი Countertrend Spike ერთვის. ეს ნიშნავს, რომ ტრენდი შესაძლოა რევერსირდეს: შეამცირეთ საწყისი მიმართულების პოზიციები და ახალ With-Trend შესვლებზე მოთხოვნები აამაღლეთ.'});
        if (a.tl_break === 'yes'){
          if (a.counter_spike === 'yes') flags.push({level:'red', text:'Trendline გარღვეულია + Countertrend Spike — Major Reversal-ის პირობები გროვდება. ახლა მთავარი დასაკვირვებელია ექსტრემის ტესტი: თუ ტესტი სუსტი იქნება (Higher Low/Lower High) და მეორე რევერსალი მოჰყვება, Reversal სეთაფი სრულფასოვანი ხდება.'});
          else flags.push({level:'yellow', text:'Trendline დღეს უკვე გაირღვა — Major Reversal-ის მე-2 პირობა შესრულებულია, თუმცა ძლიერი Countertrend Spike-ის გარეშე ეს ჯერ მხოლოდ გაფრთხილებაა. ექსტრემის ტესტამდე ტრენდი ძალაში რჩება.'});
        }
        if (a.pullback_pattern === 'small_consistent') flags.push({level:'green', text:`უკუსვლები რჩება მცირე და თანაბარი — Small Pullback Trend Day ${dir} გრძელდება, თქვენი ყველაზე ხელსაყრელი სცენარი. ძლიერ ტრენდში ფასზე დაფუძნებული ვიწრო Stop-ები ხშირად ზედმეტად ადრე გდებთ გარეთ — Stop-ი Swing-წერტილებს მიღმა ატარეთ.`});
        if (a.pullback_pattern === 'growing') flags.push({level:'yellow', text:'უკუსვლები თანდათან იზრდება — Spike ფაზა Channel ფაზაში გადადის ან ტრენდი სუსტდება. ეს ჯერ არ ნიშნავს რევერსალს, მაგრამ ორფეხა უკუსვლების ალბათობა იზრდება და მიზნები უფრო კონსერვატიული უნდა გახდეს. Channel = „მომავალი Trading Range-ის" ადრეული ფორმა.'});
      } else if (a.state12 === 'tight_range'){
        if (a.prior_trend === 'yes') flags.push({level:'yellow', text:'ტრენდის შემდეგ ვიწრო არეალი — კლასიკური Trend Resumption Day-ის შუა ფაზა. ნუ მიატოვებთ დღეს მოწყენილობის გამო: ტრენდი ხშირად ბოლო 1-2 საათში განახლდება, ჩვეულებრივ საწყისი მიმართულებით. არეალის შიგნით ნუ ივაჭრებთ — დაელოდეთ გარღვევას ან მის Pullback-ს.'});
        else flags.push({level:'neutral', text:'დღე თავიდანვე ვიწრო, უმიმართულებო არეალშია — Breakout Mode გრძელდება. სანამ მკაფიო გარღვევა არ მოხდება, აქტიური ვაჭრობის დღე არ არის. ვიწრო არეალის შუაში ყოველი შესვლა Barb Wire-ის რისკს ატარებს.'});
      } else if (a.state12 === 'broad_range'){
        if (a.range_edges === 'fuzzy') flags.push({level:'red', text:'Range-ის კიდეები ბუნდოვანია და „იშლება" — Barb Wire-ის მოტივები. ასეთ Range-ში Fade-იც კი სარისკოა: ან საერთოდ არ ივაჭროთ, ან მხოლოდ უკიდურეს გადაჭიმვებზე, განსაკუთრებით ძლიერი Signal Bar-ით.'});
        if (a.range_pos === 'edge') flags.push({level:'yellow', text:'Trading Range Day: ფასი კიდესთანაა — ერთადერთი საიმედო ლოგიკა ახლა კიდიდან Fade-ია (TR Fade), ძლიერი Reversal/Signal Bar-ით. Range-ის გარღვევის მოლოდინით შესვლა TR დღეზე ხშირად ხაფანგია — გარღვევების უმეტესობა მარცხდება.'});
        else if (a.range_pos === 'middle') flags.push({level:'red', text:'ფასი Range-ის შუაშია — ეს პირდაპირ თქვენი Veto-პრინციპია („დღის/რეინჯის შუაში"). აქ არც Fade მუშაობს და არც Breakout — დაელოდეთ, სანამ ფასი კიდეს მიაღწევს.'});
      }
    }

    if (cpKey === 'cp4'){
      const dir = dgTrendDir(all);
      if (a.state18 === 'same'){
        if (a.late_pullback === 'yes') flags.push({level:'yellow', text:'ტრენდულ დღეებზე ბოლო 1-2 საათში ხშირად მოდის ადრინდელებზე ~150-200%-ით ღრმა Pullback, რის შემდეგაც ტრენდი ხშირად დახურვამდე განახლდება. სანამ Trendline-ის ძლიერი გარღვევა და ექსტრემის წარუმატებელი ტესტი არ ჩანს — ეს Pullback-ია, არა რევერსალი. With-Trend შესვლა ამ ღრმა უკუსვლიდან ხშირად დღის ბოლო კარგი შესაძლებლობაა.'});
        else flags.push({level:'green', text:`დღე კვლავ საწყისი მიმართულებით${dir ? ' ('+dgDirWord(dir)+')' : ''} მოძრაობს — გააგრძელეთ იმავე გეგმა. ძლიერ ტრენდულ დღეებს ხშირად მეორე დღის პირველ 1-2 საათშიც აქვთ გაგრძელება — ეს ხვალინდელი გეგმისთვისაც გაითვალისწინეთ.`});
      } else if (a.state18 === 'reversed'){
        if (a.rev_confirmed === 'yes') flags.push({level:'red', text:'დადასტურებული Reversal Day — დღე ერთი მიმართულებით დაიწყო და საპირისპიროთი ამთავრებს, ხშირად მეორე დღესაც ძლიერი გაგრძელებით. ძველი მიმართულებით შესვლები შეწყვიტეთ; ახალი მიმართულებით Pullback-ები ახლა With-Trend სეთაფებია.'});
        else flags.push({level:'yellow', text:'შებრუნება ჩანს, მაგრამ Trendline-ის მკაფიო გარღვევის გარეშე — გახსოვდეთ: რევერსალის მცდელობების ~80% მარცხდება. სანამ Major Reversal-ის 4 პირობა არ შესრულდება, ეს უფრო ღრმა Pullback-ია, ვიდრე ახალი ტრენდი. ორივე მიმართულებით სიფრთხილე.'});
      } else if (a.state18 === 'side_tight'){
        flags.push({level:'yellow', text:'ვიწრო გვერდითი არეალი — Trend Resumption Day-ის სცენარი ძალაშია. მოთმინებით დაელოდეთ გვიან-შუადღის Breakout-ს, რომელიც ჩვეულებრივ საწყისი ტრენდის მიმართულებით ხდება.'});
        if (a.day_range === 'small') flags.push({level:'yellow', text:'დღის დიაპაზონი ADR-ზე მცირეა — ბაზრები საშუალო დიაპაზონისკენ „იწელებიან": გვიანი გაფართოების/Breakout-ის ალბათობა მომატებულია. ეს Trend Resumption სცენარს დამატებით ამყარებს.'});
        else if (a.day_range === 'normal') flags.push({level:'neutral', text:'ADR უკვე ათვისებულია — გვიანი Breakout-ის „საწვავი" შედარებით ნაკლებია. თუ გარღვევა მოვა, მიზნები ზომიერი დაისახეთ.'});
      } else if (a.state18 === 'side_broad'){
        flags.push({level:'yellow', text:'ფართო გვერდითი არეალი — დღე Trading Range Day-ად ჩამოყალიბდა. კიდეებთან Fade-სქალპები უფრო შესაფერისია, ვიდრე ახალი Swing-ის ძებნა. დახურვისკენ გარღვევის მცდელობებს ნუ ენდობით ავტომატურად.'});
        if (a.day_range === 'small') flags.push({level:'neutral', text:'დიაპაზონი ADR-ზე მცირეა — დახურვის წინ გაფართოება მაინც შესაძლებელია; თუ ერთ მხარეს ზედიზედ ძლიერი ტრენდული ბარები გამოჩნდება, Late Breakout-ის სცენარი გაითვალისწინეთ.'});
      }
    }
    return flags;
  }

  // სავაჭრო ორიენტირი — რა ტიპის ტრეიდებია რეკომენდებული, დასაშვები, ასარიდებელი
  function computeCheckpointRecs(cpKey, a, all){
    const rec = [], mid = [], avoid = [];
    const cp1 = (all && all.cp1) || {};

    if (cpKey === 'cp1'){
      const gapBig = a.gap_size === 'large' || a.gap_size === 'huge';
      const gDir = dgDirWord(a.gap_dir);
      if (gapBig){
        rec.push(`With Trend Gap-ის მიმართულებით (${gDir}) — გახსნის ტესტზე (Double Bottom/Top) ან პირველ Pullback-ზე`);
        mid.push('Opening Reversal Gap-ის საწინააღმდეგოდ — მხოლოდ თუ პირველ 2-3 ბარში გაგრძელება არ მოდის და ძლიერი საწინააღმდეგო ბარები ჩნდება');
        avoid.push('Gap-ის ბრმა Fade „ძალიან შორს წავიდა" ლოგიკით');
      } else if (a.gap_dir === 'none' || a.gap_size === 'small'){
        rec.push('Opening Reversal — პირველი 60-90 წუთი ამ ტიპის საუკეთესო დროა');
        mid.push('With Trend — მხოლოდ მას შემდეგ, რაც Opening Range-ის მკაფიო გარღვევა და Follow-through დადასტურდება');
      } else if (a.gap_size === 'moderate'){
        rec.push('პირველი ბარის მიმართულებით With Trend — საშუალო Gap-ზე პირველი ბარი ხშირად კარნახობს ტრენდს');
        mid.push('Opening Reversal — გუშინდელი High/Low-ს ტესტებზე');
      }
      if (a.open_vs_yday === 'above' || a.open_vs_yday === 'below'){
        rec.push(`Breakout Test გუშინდელ ${a.open_vs_yday==='above'?'High':'Low'}-ზე — ერთ-ერთი ყველაზე სუფთა ადრეული სეთაფი`);
      }
      avoid.push('პირველივე ბარის გარღვევის დევნა დადასტურების გარეშე (Trend from the Open მხოლოდ ~20%-ია)');
      if (a.report === 'yes') avoid.push('ნებისმიერი შესვლა რეპორტის ზუსტ მომენტში');
      if (a.whipsaw === 'yes') avoid.push('Barb Wire-ში ვაჭრობა — ორმხრივი ხაფანგების ზონა');
    }

    if (cpKey === 'cp2'){
      if (dgIsTrend(a.state6)){
        const dir = dgDirWord(a.state6);
        rec.push(`With Trend ${dir} — High/Low 1-2, Breakout Pullback${a.ema !== 'crossing' ? ', EMA Pullback' : ''}`);
        if (a.nopause === 'yes') rec.push('Spike-ის შემდეგ პირველი Pullback — მინიმუმ სქალპად თითქმის ყოველთვის ამართლებს');
        if (a.pullback_size === 'serious') mid.push('With Trend გაგრძელება — შემცირებული ზომით, სანამ ექსტრემის ტესტი ტრენდის ძალას დაადასტურებს');
        if (a.ema === 'crossing') mid.push('With Trend მხოლოდ საუკეთესო ხარისხის Signal Bar-ებზე — EMA-ს გარშემო ტრიალი სისუსტის ნიშანია');
        avoid.push('Reversal — Trendline-ის გარღვევა არ მომხდარა (Veto)');
        avoid.push('TR Fade — ტრენდში კიდეების Fade-ს ადგილი არ აქვს');
      } else if (a.state6 === 'tight'){
        rec.push('Breakout Pullback / Breakout Test — გარღვევის შემდეგ, გარღვევის მიმართულებით' + ((cp1.gap_size==='large'||cp1.gap_size==='huge') ? ` (უპირატესობა Gap-ის მხარეს — ${dgDirWord(cp1.gap_dir)})` : ''));
        mid.push('ლოდინი — Breakout Mode-ში პოზიციის უქონლობა სრულფასოვანი გადაწყვეტილებაა');
        avoid.push('არეალის შიგნით ვაჭრობა და გარღვევის წინასწარი გამოცნობა');
      } else if (a.state6 === 'choppy'){
        rec.push('ლოდინი — Barb Wire-ში საუკეთესო პოზიცია პოზიციის უქონლობაა');
        mid.push('TR Fade — მხოლოდ მკაფიო კიდეზე, განსაკუთრებით ძლიერი Signal Bar-ით');
        avoid.push('Breakout-ის დევნა — ბობოქარ არეალში გარღვევების უმეტესობა მარცხდება');
        avoid.push('ნებისმიერი შესვლა Doji/გადაფარვად ბარებზე (Barb Wire Veto)');
      }
    }

    if (cpKey === 'cp3'){
      if (dgIsTrend(a.state12)){
        const dir = dgDirWord(a.state12);
        if (a.counter_spike !== 'yes') rec.push(`With Trend ${dir} — Pullback-ებზე${a.pullback_pattern==='small_consistent' ? ' (Small Pullback რიტმი — მაღალი რწმენით)' : ''}`);
        else mid.push(`With Trend ${dir} — მხოლოდ გაძლიერებული კრიტერიუმებით და შემცირებული ზომით (Countertrend Spike-ის შემდეგ)`);
        if (a.pullback_pattern === 'growing') mid.push('With Trend კონსერვატიული მიზნებით — Channel ფაზაში სქალპური ლოგიკა უფრო შესაფერისია');
        if (a.tl_break === 'yes' && a.counter_spike === 'yes') mid.push('Reversal — მხოლოდ ექსტრემის სუსტი ტესტისა და მეორე რევერსალის შემდეგ (Major Reversal-ის 4 პირობა)');
        if (a.tl_break !== 'yes') avoid.push('Reversal — Trendline ხელუხლებელია (Veto)');
        avoid.push('TR Fade ტრენდის წინააღმდეგ');
      } else if (a.state12 === 'tight_range'){
        if (a.prior_trend === 'yes'){
          rec.push('ლოდინი + Breakout Pullback ტრენდის განახლებაზე (ჩვეულებრივ საწყისი მიმართულებით)');
          mid.push('TR Fade არეალის კიდეებზე — მხოლოდ მცირე მიზნებით');
        } else {
          rec.push('ლოდინი — გარღვევამდე დღე უმიმართულებოა');
          mid.push('Breakout Pullback — მკაფიო გარღვევის დადასტურების შემდეგ');
        }
        avoid.push('ვიწრო არეალის შუაში ნებისმიერი შესვლა (Barb Wire რისკი)');
      } else if (a.state12 === 'broad_range'){
        if (a.range_edges === 'clear' && a.range_pos === 'edge') rec.push('TR Fade კიდიდან — ძლიერი Reversal/Signal Bar-ით, მიზანი Range-ის შუამდე/მოპირდაპირე კიდემდე');
        else if (a.range_edges === 'clear') rec.push('TR Fade — მაგრამ მხოლოდ მაშინ, როცა ფასი კიდეს მიაღწევს');
        if (a.range_edges === 'fuzzy') mid.push('TR Fade — მხოლოდ უკიდურეს გადაჭიმვებზე, ბუნდოვანი კიდეები Fade-ის სანდოობას ამცირებს');
        avoid.push('Breakout-ის მიდევნება — TR დღეზე გარღვევების უმეტესობა მარცხდება');
        avoid.push('ვაჭრობა Range-ის შუაში (Veto)');
        avoid.push('Swing-მოლოდინები — TR დღეზე მიზნები სქალპურია');
      }
    }

    if (cpKey === 'cp4'){
      const dir = dgTrendDir(all);
      if (a.state18 === 'same'){
        rec.push(`With Trend${dir ? ' '+dgDirWord(dir) : ''} — ${a.late_pullback==='yes' ? 'გვიანი ღრმა Pullback ხშირად დღის ბოლო კარგი შესვლაა' : 'იმავე გეგმით, Pullback-ებზე'}`);
        mid.push('პოზიციის ნაწილის Swing-ად დატოვება დახურვამდე — ტრენდულ დღეებზე დახურვისკენ გაგრძელება ხშირია');
        avoid.push('Countertrend „დღე უკვე დიდია, უნდა შებრუნდეს" ლოგიკით — ტრენდულ დღეს ზღვარი არ აქვს');
      } else if (a.state18 === 'reversed'){
        if (a.rev_confirmed === 'yes'){
          rec.push('With Trend ახალი მიმართულებით — Pullback-ები ახალ ტრენდში ახლა სტანდარტული სეთაფებია');
          avoid.push('ძველი მიმართულებით შესვლები — ის ტრენდი დასრულებულია');
        } else {
          mid.push('ორივე მიმართულებით მხოლოდ მცირე ზომა — სტრუქტურა ჯერ არ ჩამოყალიბდა');
          avoid.push('Reversal-ის დევნა Major Reversal-ის პირობების შესრულებამდე (~80% მარცხდება)');
        }
      } else if (a.state18 === 'side_tight'){
        rec.push('გვიანი Breakout Pullback — Trend Resumption ჩვეულებრივ საწყისი მიმართულებით ხდება');
        mid.push('ლოდინი გარღვევამდე');
        avoid.push('არეალის შიგნით ვაჭრობა ბოლო საათებში');
      } else if (a.state18 === 'side_broad'){
        rec.push('TR Fade სქალპები კიდეებთან — მცირე მიზნებით');
        mid.push(a.day_range === 'small' ? 'Late Breakout-ის თვალყური — ADR-ის დეფიციტი გვიან გაფართოებას უწყობს ხელს' : 'დღის დასრულება — ADR ათვისებულია, ახალი დიდი მოძრაობის ალბათობა დაბალია');
        avoid.push('Swing-მოლოდინები და დახურვისწინა გარღვევების ბრმა ნდობა');
      }
    }
    return { rec, mid, avoid };
  }

  // სავარაუდო სცენარები — რა ტიპის დღედ შეიძლება გადაიქცეს და როგორ მიხვდე
  function dgScenarios(answers){
    const a1 = answers.cp1 || {}, a2 = answers.cp2 || {}, a3 = answers.cp3 || {}, a4 = answers.cp4 || {};
    const out = [];
    const gapBig = a1.gap_size === 'large' || a1.gap_size === 'huge';
    const gDir = dgDirWord(a1.gap_dir);

    // ბოლო შევსებული ეტაპი წყვეტს, რომელი სცენარებია ჯერ კიდევ „ცოცხალი"
    if (a4.state18){
      if (a4.state18 === 'same'){
        out.push({label:'ტრენდი დახურვამდე', cue:'უკუსვლები With-Trend ბარებით სრულდება; დახურვისკენ ხშირად ბოლო ბიძგი მოდის'});
        out.push({label:'გვიანი ღრმა Pullback → განახლება', cue:'ბოლო 1-2 საათში ადრინდელებზე ~150-200% ღრმა უკუსვლა, TL-ის გარღვევის გარეშე'});
        out.push({label:'გვიანი Reversal (იშვიათი)', cue:'TL ირღვევა + ექსტრემის სუსტი ტესტი — მხოლოდ მაშინ განიხილეთ'});
      } else if (a4.state18 === 'reversed'){
        out.push({label:'Reversal Day სრული განვითარებით', cue:'ახალი მიმართულების Pullback-ები მცირდება; დღე ახალი ექსტრემისკენ იხურება, ხვალაც გაგრძელება ხშირია'});
        out.push({label:'Failed Reversal → ძველი ტრენდის დაბრუნება', cue:'ახალი მოძრაობა ორ ფეხზე მეტს ვერ დგამს და ძველი ექსტრემისკენ ბრუნდება'});
      } else {
        out.push({label:'Trend Resumption Day', cue:'გვიანი Breakout არეალიდან, ჩვეულებრივ საწყისი მიმართულებით — Breakout Pullback შესვლის ადგილია'});
        out.push({label:'Trading Range-დახურვა', cue:'Breakout დახურვამდე არ მოდის; დღე არეალშივე სრულდება'});
        if (a4.day_range === 'small') out.push({label:'Late Breakout (ADR-ის შევსება)', cue:'ერთ მხარეს ზედიზედ ძლიერი ტრენდული ბარები ჩნდება ბოლო საათში'});
      }
      return out.slice(0,3);
    }

    if (a3.state12){
      if (dgIsTrend(a3.state12)){
        const dir = dgDirWord(a3.state12);
        if (a3.pullback_pattern === 'small_consistent') out.push({label:`Small Pullback Trend Day ${dir}`, cue:'უკუსვლები კვლავ მცირე რჩება, EMA დისტანციაზეა — ყველაზე ძლიერი სცენარი'});
        else out.push({label:`ტრენდული დღე ${dir}`, cue:'Pullback-ები With-Trend ბარებით სრულდება, ახალი ექსტრემები კეთდება'});
        if (a3.pullback_pattern === 'growing') out.push({label:'Spike and Channel → გვიანი TR', cue:'უკუსვლები კიდევ ღრმავდება; Channel-ის დასაწყისი ხშირად დღის ბოლოს იტესტება'});
        out.push({label:'Reversal Day', cue:(a3.tl_break==='yes'?'TL უკვე გარღვეულია — ':'ჯერ TL-ის გარღვევაა საჭირო; შემდეგ ')+'ექსტრემის სუსტი ტესტი (LH/HL) + მეორე რევერსალი = დადასტურება'});
        out.push({label:'Trend Resumption Day', cue:'ტრენდი შუადღეს ვიწრო პაუზაში გადავა და ბოლო 1-2 საათში განახლდება'});
      } else if (a3.state12 === 'tight_range'){
        if (a3.prior_trend === 'yes'){
          out.push({label:'Trend Resumption Day', cue:'გვიანი Breakout საწყისი მიმართულებით — ყველაზე ხშირი გაგრძელება ამ სურათიდან'});
          out.push({label:'Trending Trading Range Day', cue:'გარღვევა ახალ არეალს ქმნის და ისევ ჩერდება — სტეპებით მოძრაობა'});
          out.push({label:'Reversal არეალიდან', cue:'გარღვევა ტრენდის საწინააღმდეგო მხარეს ხდება ძლიერი ბარებით'});
        } else {
          out.push({label:'Trading Range Day', cue:'გარღვევა არ მოდის; დღე ვიწრო/საშუალო არეალშივე სრულდება'});
          out.push({label:'გვიანი Trend Day', cue:'ვიწრო არეალი „დაჭიმულ ზამბარას" ჰგავს — მკაფიო გარღვევა Follow-through-თი ტრენდს იწყებს'});
        }
      } else if (a3.state12 === 'broad_range'){
        out.push({label:'Trading Range Day', cue:'კიდეები იცავს, Fade-ები მუშაობს — ძირითადი სცენარი'});
        out.push({label:'Trending Trading Range Day', cue:'ერთ-ერთი კიდე ირღვევა და ფასი ახალ, მომიჯნავე არეალში ინაცვლებს'});
        out.push({label:'გვიანი Breakout Trend', cue:'დახურვის წინ ერთ მხარეს ზედიზედ ძლიერი ტრენდული ბარები'});
      }
      return out.slice(0,3);
    }

    if (a2.state6){
      if (dgIsTrend(a2.state6)){
        const dir = dgDirWord(a2.state6);
        const gapConflict = (a1.gap_dir === 'up' && a2.state6 === 'trend_down') || (a1.gap_dir === 'down' && a2.state6 === 'trend_up');
        if (a2.pullback_size === 'small') out.push({label:`Small Pullback Trend Day ${dir}`, cue:'უკუსვლები ≤ საწყისი მოძრაობის ~30% და TL-ს არ არღვევს'});
        else if (a2.nopause === 'yes') out.push({label:'Spike and Channel', cue:'Spike-ს პირველი ღრმა Pullback მოჰყვება და შემდეგ დახრილი, ნელი Channel იწყება'});
        else out.push({label:`ტრენდული დღე ${dir}`, cue:'პირველი Pullback მცირე რჩება და With-Trend ბარით სრულდება'});
        if (gapConflict && gapBig) out.push({label:'Gap Reversal → Trend from the Open '+dir, cue:'გახსნის Failed Breakout მუშაობს — გახსნის დონე წინაღობად იქცევა'});
        out.push({label:'Reversal Day', cue:'ძლიერი Countertrend Spike + TL-ის გარღვევა პირველივე საათებში'});
        out.push({label:'Trend Resumption Day', cue:'დილის ტრენდი შუადღეს პაუზაში გადადის; განახლება ბოლო 1-2 საათში'});
      } else if (a2.state6 === 'tight'){
        out.push({label:'Breakout → Trend Day', cue:(gapBig?`დიდი Gap-ის ფონზე უპირატესობა ${gDir} გარღვევას აქვს; `:'')+'გარღვევას Follow-through ბარები მოჰყვება'});
        out.push({label:'Trending Trading Range Day', cue:'Opening Range ~50% ADR-ისაა და გარღვევა სტეპებით, პაუზებით მიდის'});
        out.push({label:'Trading Range Day', cue:'გარღვევის მცდელობები ორივე მხარეს მარცხდება'});
      } else if (a2.state6 === 'choppy'){
        out.push({label:'Trading Range Day', cue:'ორმხრივი ბობოქრობა კიდეებიან არეალში ლაგდება — Fade-ები იწყებს მუშაობას'});
        out.push({label:'Trend Resumption / გვიანი Trend', cue:'შუადღისკენ არეალი ვიწროვდება და ერთ მხარეს მკაფიო გარღვევა მოდის'});
        out.push({label:'Barb Wire მთელი დღე', cue:'არეალი ვიწრო რჩება, Doji-ები ჭარბობს — უვაჭრო დღე'});
      }
      return out.slice(0,3);
    }

    if (a1.gap_dir){
      if (gapBig){
        out.push({label:`Trend from the Open ${gDir} (Gap-ის მიმართულებით)`, cue:'გახსნის ტესტი უჭირავს (Double Bottom/Top), Pullback-ები მცირეა, EMA არ იტესტება'});
        out.push({label:'Gap Reversal — ტრენდი საწინააღმდეგოდ', cue:'პირველ 2-3 ბარში გაგრძელება არ მოდის; ძლიერი საწინააღმდეგო ბარები გახსნის დონეს არღვევს'});
        out.push({label:'Trending Trading Range Day', cue:'Opening Range ფართოა (~50% ADR); მოძრაობა სტეპებით, პაუზებით მიდის'});
      } else {
        if (a1.whipsaw === 'yes') out.push({label:'Trading Range Day', cue:'ორმხრივი ხაფანგები გრძელდება, ფასი გუშინდელი დიაპაზონის შიგნით რჩება'});
        out.push({label:'Opening Reversal → ტრენდი', cue:'პირველი 30-60 წუთის ექსტრემი უმტყუნებს და საწინააღმდეგო მოძრაობა ორ ფეხს აშენებს'});
        if (a1.whipsaw !== 'yes') out.push({label:'Trading Range Day', cue:'ფასი გუშინდელი დიაპაზონის შიგნით რჩება, ორივე მხარეს ტაილები ჭარბობს'});
        out.push({label:'Trend Resumption Day', cue:'დილის მოძრაობა + ხანგრძლივი შუადღის პაუზა + გვიანი განახლება'});
      }
      return out.slice(0,3);
    }
    return out;
  }

  // დღის სავარაუდო ტიპის სინთეზი ყველა პასუხიდან — ბოლო შევსებული
  // checkpoint-ი ყველაზე მეტს იწონის.
  function dgEstimateDayType(answers){
    const a1 = answers.cp1 || {}, a2 = answers.cp2 || {}, a3 = answers.cp3 || {}, a4 = answers.cp4 || {};
    const smallPullbacks = a2.pullback_size === 'small' || a3.pullback_pattern === 'small_consistent';
    const dir = dgTrendDir(answers);
    const dirW = dir ? ' ' + dgDirWord(dir) : '';

    if (a4.state18){
      if (a4.state18 === 'same'){
        return { tone:'green', label: (smallPullbacks ? 'Trend from the Open — Small Pullback Trend Day' : 'ტრენდული დღე საწყისი მიმართულებით') + dirW,
          note: a4.late_pullback === 'yes' ? 'გვიანი ღრმა Pullback ნორმაა — ტრენდი ხშირად დახურვამდე ახლდება.' : 'გეგმა უცვლელია: With-Trend შესვლები Pullback-ებზე.' };
      }
      if (a4.state18 === 'reversed'){
        return a4.rev_confirmed === 'yes'
          ? { tone:'red', label:'Reversal Day', note:'ახალი მიმართულება დომინანტურია; ხვალაც შესაძლოა გაგრძელდეს.' }
          : { tone:'yellow', label:'შესაძლო Reversal Day (დაუდასტურებელი)', note:'TL-ის გარღვევის გარეშე ~80% ასეთი მცდელობა მარცხდება.' };
      }
      if (a4.state18 === 'side_tight') return { tone:'yellow', label:'Trend Resumption Day (მოსალოდნელი)', note:'გვიანი Breakout, როგორც წესი, საწყისი მიმართულებით.' };
      if (a4.state18 === 'side_broad') return { tone:'yellow', label:'Trading Range Day', note:'მხოლოდ Fade კიდეებთან; შუაში — Veto.' };
    }

    if (a3.state12){
      if (dgIsTrend(a3.state12)){
        if (a3.counter_spike === 'yes') return { tone:'yellow', label:'ტრენდი'+dirW+' — რევერსალის ადრეული ნიშნებით', note: a3.tl_break==='yes' ? 'TL გარღვეულია + Countertrend Spike — ექსტრემის ტესტს დააკვირდით.' : 'Countertrend Spike ჩანს; ტრენდის ტიპი შესაძლოა შეიცვალოს.' };
        if (a3.pullback_pattern === 'growing') return { tone:'yellow', label:'Spike and Channel'+dirW, note:'Channel ფაზა — მიზნები კონსერვატიული, ორფეხა უკუსვლები ხშირი.' };
        return { tone:'green', label: (smallPullbacks ? 'Small Pullback Trend Day' : 'ტრენდული დღე') + dirW, note:'With-Trend ლოგიკა ძალაშია.' };
      }
      if (a3.state12 === 'tight_range'){
        return a3.prior_trend === 'yes'
          ? { tone:'yellow', label:'Trend Resumption Day (შესაძლო)', note:'ტრენდი ხშირად ბოლო 1-2 საათში ახლდება.' }
          : { tone:'neutral', label:'Breakout Mode — უმიმართულებო დღე', note:'გარღვევამდე აქტიური ვაჭრობის დღე არ არის.' };
      }
      if (a3.state12 === 'broad_range') return { tone:'yellow', label:'Trading Range Day', note: a3.range_edges==='fuzzy' ? 'კიდეები ბუნდოვანია — Fade-იც კი სარისკოა.' : 'TR Fade კიდეებთან — ერთადერთი ლოგიკა.' };
    }

    if (a2.state6){
      if (dgIsTrend(a2.state6)){
        if (a2.nopause === 'yes' && a2.pullback_size !== 'small') return { tone:'yellow', label:'Spike → სავარაუდოდ Spike and Channel'+dirW, note:'პირველი Pullback-ის ხარისხი დააზუსტებს დღის ტიპს.' };
        if (a2.pullback_size === 'small') return { tone:'green', label:'Small Pullback Trend Day (ადრეული ნიშნები)'+dirW, note:'ყველაზე ძლიერი ტიპის ტრენდი — With-Trend ყოველ მცირე უკუსვლაზე.' };
        return { tone:'neutral', label:'ტრენდის ადრეული ფაზა'+dirW, note:'ტიპი ჯერ ზუსტდება.' };
      }
      if (a2.state6 === 'tight'){
        return (a1.gap_size === 'large' || a1.gap_size === 'huge')
          ? { tone:'green', label:'Breakout Mode დიდ Gap-ზე', note:'გარღვევა ხშირად ძლიერ ტრენდს იწყებს, უპირატესობა Gap-ის მიმართულებას.' }
          : { tone:'neutral', label:'Breakout Mode', note:'ორივე მხარე ღიაა — დაელოდეთ გარღვევას.' };
      }
      if (a2.state6 === 'choppy') return { tone:'yellow', label:'Trading Range / Barb Wire გახსნა', note:'მოთმინება; მხოლოდ კიდეებთან Fade.' };
    }

    if (a1.gap_dir){
      if (a1.gap_size === 'large' || a1.gap_size === 'huge') return { tone:'yellow', label:'ტრენდული დღის მაღალი ალბათობა', note:'დიდი Gap = Breakout; მიმართულება ჯერ ორივე მხარეს ღიაა.' };
      if (a1.whipsaw === 'yes') return { tone:'neutral', label:'საწყისი Trading Range ყალიბდება', note:'პირველი საათი — Opening Reversal-ების დრო.' };
      return { tone:'neutral', label:'ჯერ ადრეა', note:'Opening Range-ის ჩამოყალიბებას დააკვირდით.' };
    }
    return null;
  }

  function dgToneVar(tone){
    return tone==='red' ? 'var(--tj-red)' : tone==='yellow' ? 'var(--tj-amber)' : tone==='green' ? 'var(--tj-green)' : 'var(--tj-text3)';
  }
  function dgFlagLabel(level){
    return level==='red' ? 'გაფრთხილება' : level==='yellow' ? 'ყურადღება' : level==='green' ? 'ხელსაყრელი' : 'ნეიტრალური';
  }

  let dgOpenOverride = {}; // cpKey -> true/false; ხელით გახსნა-დახურვის მდგომარეობა

  function renderDayGuide(){
    let answers = loadDayGuideAnswers();

    function cpStatus(cp){
      const cpA = answers[cp.key] || {};
      const visible = dgVisibleQuestions(cp, cpA);
      const answered = visible.filter(q => cpA[q.key]).length;
      return { answered, total: visible.length, done: answered === visible.length && visible.length > 0 };
    }

    const statuses = DAY_GUIDE_CHECKPOINTS.map(cp => ({ key: cp.key, ...cpStatus(cp) }));
    const firstIncomplete = statuses.find(s => !s.done);
    const firstIncompleteKey = firstIncomplete ? firstIncomplete.key : null;
    const estimate = dgEstimateDayType(answers);
    const scenarios = dgScenarios(answers);

    function renderRecs(recs){
      if (!recs || (!recs.rec.length && !recs.mid.length && !recs.avoid.length)) return '';
      function row(cls, title, items){
        if (!items.length) return '';
        return `<div class="tj-dg-rec ${cls}">
          <div class="tj-dg-rec-title">${title}</div>
          <div>${items.map(t=>`<div class="tj-dg-rec-item">${t}</div>`).join('')}</div>
        </div>`;
      }
      return `
        <div style="margin-top:14px; padding-top:14px; border-top:0.5px dashed var(--tj-border);">
          <div style="font-size:11px; color:var(--tj-text3); letter-spacing:0.4px; text-transform:uppercase; margin-bottom:9px;">სავაჭრო ორიენტირი</div>
          <div style="display:flex; flex-direction:column; gap:8px;">
            ${row('green','რეკომენდებული', recs.rec)}
            ${row('yellow','დასაშვები / გაფრთხილებით', recs.mid)}
            ${row('red','ასარიდებელი', recs.avoid)}
          </div>
        </div>`;
    }

    function renderCheckpoint(cp, idx){
      const cpAnswers = answers[cp.key] || {};
      const st = statuses[idx];
      const isOpen = dgOpenOverride[cp.key] !== undefined ? dgOpenOverride[cp.key] : (cp.key === firstIncompleteKey || (!firstIncompleteKey && idx === DAY_GUIDE_CHECKPOINTS.length - 1));
      const isCurrent = cp.key === firstIncompleteKey;
      const flags = st.done ? computeCheckpointGuidance(cp.key, cpAnswers, answers) : [];
      const recs = st.done ? computeCheckpointRecs(cp.key, cpAnswers, answers) : null;
      const worstTone = flags.some(f=>f.level==='red') ? 'red' : flags.some(f=>f.level==='yellow') ? 'yellow' : flags.some(f=>f.level==='green') ? 'green' : 'neutral';
      const visible = dgVisibleQuestions(cp, cpAnswers);

      return `
        <div class="tj-dg-card${isCurrent ? ' current' : ''}${st.done ? ' done' : ''}">
          <div class="tj-dg-head" data-dg-toggle="${cp.key}">
            <span class="tj-dg-num${st.done ? ' done' : ''}">${st.done ? '✓' : idx+1}</span>
            <span class="tj-serif" style="font-size:15px; font-weight:600; color:var(--tj-text);">${cp.barLabel}</span>
            <span style="font-size:12px; color:var(--tj-text2);">${cp.title}</span>
            <span class="tj-dg-time tj-mono">${cp.timeHint}</span>
            ${isCurrent ? '<span class="tj-dg-badge">მიმდინარე</span>' : ''}
            ${st.done && !isOpen ? `<span style="width:8px; height:8px; border-radius:50%; background:${dgToneVar(worstTone)}; flex-shrink:0;"></span>` : ''}
            <span class="tj-dg-chevron" style="transform:rotate(${isOpen ? 90 : 0}deg);">›</span>
          </div>
          <div class="tj-dg-body" style="display:${isOpen ? 'block' : 'none'};">
            <div style="display:flex; flex-direction:column; gap:16px;">
              ${visible.map(q => `
                <div>
                  <div style="font-size:12.5px; color:var(--tj-text2); margin-bottom:7px; line-height:1.5;">${q.q}</div>
                  <div style="display:flex; flex-wrap:wrap; gap:6px;">
                    ${q.options.map(([val,label,tip]) => `
                      <button type="button" class="tj-dg-opt${cpAnswers[q.key]===val ? ' sel' : ''}" data-cp="${cp.key}" data-q="${q.key}" data-val="${val}">
                        ${label}${tip ? `<span class="tj-dg-i" data-dg-info>i<span class="tj-dg-tip">${tip}</span></span>` : ''}
                      </button>
                    `).join('')}
                  </div>
                </div>
              `).join('')}
            </div>
            ${flags.length ? `
              <div style="margin-top:16px; padding-top:14px; border-top:0.5px dashed var(--tj-border); display:flex; flex-direction:column; gap:9px;">
                ${flags.map(f=>`
                  <div class="tj-dg-flag ${f.level}">
                    <div class="tj-dg-flag-label">${dgFlagLabel(f.level)}</div>
                    <div>${f.text}</div>
                  </div>
                `).join('')}
              </div>
            ` : ''}
            ${recs ? renderRecs(recs) : ''}
          </div>
        </div>
      `;
    }

    const doneCount = statuses.filter(s=>s.done).length;

    bodyEl.innerHTML = `
      <div class="tj-serif" style="font-size:18px; font-weight:600; margin-bottom:6px;">დღის გზამკვლევი</div>
      <div style="font-size:13px; color:var(--tj-text2); margin-bottom:18px; line-height:1.6;">
        4 checkpoint — ბარი 3, 6, 12 და 18 (5-წუთიან ჩარტზე). კითხვები კონტექსტს ერგება და მხოლოდ რელევანტური ჩნდება; ყოველ პასუხს <span class="tj-dg-i" style="position:static; cursor:default;">i</span> ნიშანთან ვრცელი განმარტება ახლავს. პასუხების მიხედვით სისტემა ადგენს დღის სავარაუდო ტიპს, ცოცხალ სცენარებს და სავაჭრო ორიენტირს. წყარო — Al Brooks, <i>Trading Price Action: Trends</i>. პასუხები ინახება მხოლოდ დღევანდელი დღისთვის.
      </div>

      <div class="tj-dg-summary" style="border-left:3px solid ${estimate ? dgToneVar(estimate.tone) : 'var(--tj-border)'};">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:14px;">
          <div>
            <div style="font-size:11px; color:var(--tj-text3); letter-spacing:0.4px; text-transform:uppercase; margin-bottom:4px;">დღის სავარაუდო ტიპი</div>
            <div class="tj-serif" style="font-size:16px; font-weight:600; color:${estimate ? 'var(--tj-text)' : 'var(--tj-text3)'};">${estimate ? estimate.label : 'უპასუხეთ კითხვებს ქვემოთ'}</div>
            ${estimate && estimate.note ? `<div style="font-size:12px; color:var(--tj-text2); margin-top:4px; line-height:1.5;">${estimate.note}</div>` : ''}
          </div>
          <div class="tj-mono" style="font-size:12px; color:var(--tj-text3); white-space:nowrap;">${doneCount}/4</div>
        </div>
        ${scenarios.length ? `
          <div style="margin-top:12px; padding-top:12px; border-top:0.5px dashed var(--tj-border);">
            <div style="font-size:11px; color:var(--tj-text3); letter-spacing:0.4px; text-transform:uppercase; margin-bottom:8px;">სავარაუდო სცენარები — და როგორ ამოიცნოთ</div>
            <div style="display:flex; flex-direction:column; gap:7px;">
              ${scenarios.map(s=>`
                <div style="font-size:12.5px; line-height:1.55;">
                  <span style="color:var(--tj-text); font-weight:600;">${s.label}</span>
                  <span style="color:var(--tj-text3);"> — </span>
                  <span style="color:var(--tj-text2);">${s.cue}</span>
                </div>
              `).join('')}
            </div>
          </div>
        ` : ''}
      </div>

      ${DAY_GUIDE_CHECKPOINTS.map((cp,i)=>renderCheckpoint(cp,i)).join('')}
      <button type="button" id="tj-dayguide-reset" style="padding:7px 14px; border-radius:8px; border:0.5px solid var(--tj-border); background:transparent; color:var(--tj-text3); font-size:12px; cursor:pointer;">დღევანდელი პასუხების გასუფთავება</button>
    `;

    bodyEl.querySelectorAll('[data-dg-toggle]').forEach(head=>{
      head.addEventListener('click', ()=>{
        const key = head.dataset.dgToggle;
        const idx = DAY_GUIDE_CHECKPOINTS.findIndex(c=>c.key===key);
        const wasOpen = dgOpenOverride[key] !== undefined ? dgOpenOverride[key] : (key === firstIncompleteKey || (!firstIncompleteKey && idx === DAY_GUIDE_CHECKPOINTS.length - 1));
        dgOpenOverride[key] = !wasOpen;
        renderDayGuide();
      });
    });

    // ⓘ — მობილურზე დაჭერით tooltip იხსნება პასუხის არჩევის გარეშე
    bodyEl.querySelectorAll('[data-dg-info]').forEach(icon=>{
      icon.addEventListener('click', (e)=>{
        e.stopPropagation();
        const tip = icon.querySelector('.tj-dg-tip');
        const wasShown = tip.classList.contains('show');
        bodyEl.querySelectorAll('.tj-dg-tip.show').forEach(t=>t.classList.remove('show'));
        if (!wasShown) tip.classList.add('show');
      });
    });

    bodyEl.querySelectorAll('[data-cp][data-q][data-val]').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.stopPropagation();
        const cpKey = btn.dataset.cp, qKey = btn.dataset.q, val = btn.dataset.val;
        if (!answers[cpKey]) answers[cpKey] = {};
        answers[cpKey][qKey] = val;
        // განშტოების შეცვლისას მოძველებული (უკვე უხილავი) პასუხების წაშლა,
        // რომ ძველმა პასუხმა გზამკვლევი არ დააბინძუროს
        const cp = DAY_GUIDE_CHECKPOINTS.find(c=>c.key===cpKey);
        const visibleKeys = dgVisibleQuestions(cp, answers[cpKey]).map(q=>q.key);
        Object.keys(answers[cpKey]).forEach(k=>{ if (!visibleKeys.includes(k)) delete answers[cpKey][k]; });
        saveDayGuideAnswers(answers);
        renderDayGuide();
      });
    });

    const resetBtn = bodyEl.querySelector('#tj-dayguide-reset');
    if (resetBtn) resetBtn.onclick = () => {
      if (!confirm('გავასუფთაო დღევანდელი პასუხები?')) return;
      window.localStorage.removeItem(dayGuideKey());
      dgOpenOverride = {};
      renderDayGuide();
    };
  }

  function renderAccounts(editId){
    const editing = editId ? accounts.find(a=>a.id===editId) : null;
    bodyEl.innerHTML = `
      <div class="tj-serif" style="font-size:18px; font-weight:600; margin-bottom:6px;">ანგარიშები</div>
      <div style="font-size:13px; color:var(--tj-text2); margin-bottom:20px; line-height:1.6;">
        დაამატეთ ანგარიშის სახელი და საწყისი ბალანსი. "აქტიური" ანგარიშის საწყისი ბალანსიდან იწყება ათვლა ანალიტიკის Equity Curve-ზე ($).
      </div>

      <form id="tj-account-form" style="background:var(--tj-panel); border:0.5px solid var(--tj-border); border-radius:10px; padding:16px; margin-bottom:24px;">
        <div style="font-size:13px; font-weight:500; margin-bottom:12px;">${editing ? 'ანგარიშის რედაქტირება' : 'ახალი ანგარიშის დამატება'}</div>
        <div style="display:grid; grid-template-columns:repeat(2, minmax(160px,1fr)); gap:12px; margin-bottom:14px;">
          <div>${fieldLabel('სახელი')}<input type="text" name="label" required placeholder="მაგ. Topstep 50K #1" style="${inputStyle()}" value="${editing ? editing.label : ''}"/></div>
          <div>${fieldLabel('საწყისი ბალანსი ($)')}<input type="number" step="0.01" name="startBalance" required style="${inputStyle()}" value="${editing ? editing.startBalance : ''}"/></div>
        </div>
        <label style="display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--tj-text2); margin-bottom:14px; cursor:pointer;">
          <input type="checkbox" name="active" ${editing && editing.active ? 'checked' : ''}/> აქტიური — ამ ანგარიშის ბალანსიდან დაითვალოს Equity Curve ($) ანალიტიკაში
        </label>
        <button type="submit" style="padding:8px 18px; border-radius:8px; border:0.5px solid var(--tj-accent); background:rgba(110,147,176,0.15); color:var(--tj-text); font-size:13px; cursor:pointer;">${editing ? 'შენახვა' : 'დამატება'}</button>
        ${editing ? `<button type="button" id="tj-account-cancel" style="margin-left:8px; padding:8px 18px; border-radius:8px; border:0.5px solid var(--tj-border); background:transparent; color:var(--tj-text2); font-size:13px; cursor:pointer;">გაუქმება</button>` : ''}
        <input type="hidden" name="id" value="${editing ? editing.id : ''}"/>
      </form>

      <div id="tj-accounts-list" style="display:flex; flex-direction:column; gap:10px;"></div>
    `;

    const form = bodyEl.querySelector('#tj-account-form');
    const cancelBtn = bodyEl.querySelector('#tj-account-cancel');
    if (cancelBtn) cancelBtn.onclick = () => renderAccounts();

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const fd = new FormData(form);
      const id = fd.get('id') || ('acc_' + Date.now());
      const wantsActive = fd.get('active') === 'on';
      if (wantsActive) accounts.forEach(a => { a.active = false; });
      const data = {
        id,
        label: fd.get('label'),
        startBalance: parseFloat(fd.get('startBalance')) || 0,
        active: wantsActive,
      };
      const existingIdx = accounts.findIndex(a=>a.id===id);
      if (existingIdx >= 0) accounts[existingIdx] = data;
      else accounts.push(data);
      persistAccounts();
      renderAccounts();
    });

    const listEl = bodyEl.querySelector('#tj-accounts-list');
    if (accounts.length === 0){
      listEl.innerHTML = `<div style="font-size:12.5px; color:var(--tj-text3); padding:20px 0;">ჯერ არცერთი ანგარიში არ დამატებულა.</div>`;
      return;
    }

    listEl.innerHTML = accounts.map(a => `
      <div style="background:var(--tj-panel); border:0.5px solid var(--tj-border); border-radius:10px; padding:14px 16px; display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;">
        <div>
          <span style="font-size:14px; font-weight:600; color:var(--tj-text);">${a.label}</span>
          <span style="font-size:12px; color:var(--tj-text2); margin-left:10px;">საწყისი ბალანსი: $${Number(a.startBalance).toLocaleString()}</span>
          ${a.active ? `<span style="font-size:11px; margin-left:10px; padding:2px 8px; border-radius:999px; border:0.5px solid var(--tj-green); color:var(--tj-green);">აქტიური</span>` : ''}
        </div>
        <div style="display:flex; gap:8px;">
          <button data-edit="${a.id}" style="padding:5px 12px; border-radius:7px; border:0.5px solid var(--tj-border); background:transparent; color:var(--tj-text2); font-size:11.5px; cursor:pointer;">რედაქტირება</button>
          <button data-del="${a.id}" style="padding:5px 12px; border-radius:7px; border:0.5px solid var(--tj-red); background:transparent; color:var(--tj-red); font-size:11.5px; cursor:pointer;">წაშლა</button>
        </div>
      </div>
    `).join('');

    listEl.querySelectorAll('[data-edit]').forEach(btn=>{
      btn.onclick = () => renderAccounts(btn.dataset.edit);
    });
    listEl.querySelectorAll('[data-del]').forEach(btn=>{
      btn.onclick = () => {
        if (!confirm('წავშალო ეს ანგარიში?')) return;
        accounts = accounts.filter(a=>a.id !== btn.dataset.del);
        persistAccounts();
        renderAccounts();
      };
    });
  }

  function renderBody(){
    if (tab === 'new') renderNewTrade();
    else if (tab === 'log') renderLog();
    else if (tab === 'stats') renderStats();
    else if (tab === 'ai') renderAI();
    else if (tab === 'accounts') renderAccounts();
    else if (tab === 'dayguide') renderDayGuide();
    else renderGuide();
  }

  const statusEl = root.querySelector('#tj-status');
  function showStatus(text, kind){
    statusEl.style.display = 'block';
    statusEl.style.color = kind==='error' ? 'var(--tj-red)' : kind==='ok' ? 'var(--tj-green)' : 'var(--tj-text2)';
    statusEl.textContent = text;
  }

  async function loadTrades(){
    if (!currentUser){ trades = []; return; }
    try {
      const { data, error } = await supabase
        .from('trades')
        .select('id, data')
        .eq('user_id', currentUser.id)
        .order('created_at', { ascending: true });
      if (error) throw error;
      trades = (data || []).map(row => ({ ...row.data, id: row.id }));
      statusEl.style.display = 'none';
    } catch(e){
      trades = [];
      showStatus('ტრეიდების ჩატვირთვა ვერ მოხერხდა: ' + (e && e.message ? e.message : 'უცნობი შეცდომა'), 'error');
    }
  }

  async function addTradeRemote(trade){
    if (!currentUser){ showStatus('გთხოვთ, ჯერ შეხვიდეთ ანგარიშში.', 'error'); return false; }
    try {
      const { id, ...rest } = trade;
      const { data, error } = await supabase
        .from('trades')
        .insert({ user_id: currentUser.id, data: rest })
        .select('id, data')
        .single();
      if (error) throw error;
      trades.push({ ...data.data, id: data.id });
      statusEl.style.display = 'none';
      return true;
    } catch(e){
      showStatus('შენახვის შეცდომა: ' + (e && e.message ? e.message : 'უცნობი') + ' — გამოიყენეთ Export ბექაფისთვის.', 'error');
      return false;
    }
  }

  async function updateTradeRemote(id, tradeData){
    if (!currentUser) { showStatus('გთხოვთ, ჯერ შეხვიდეთ ანგარიშში.', 'error'); return false; }
    try {
      const { error } = await supabase
        .from('trades')
        .update({ data: tradeData })
        .eq('id', id)
        .eq('user_id', currentUser.id);
      if (error) throw error;
      const idx = trades.findIndex(t => t.id === id);
      if (idx !== -1) trades[idx] = { ...tradeData, id };
      statusEl.style.display = 'none';
      return true;
    } catch(e){
      showStatus('განახლების შეცდომა: ' + (e && e.message ? e.message : 'უცნობი'), 'error');
      return false;
    }
  }

  async function deleteTradeRemote(id){
    if (!currentUser) return false;
    try {
      const { error } = await supabase.from('trades').delete().eq('id', id).eq('user_id', currentUser.id);
      if (error) throw error;
      trades = trades.filter(t => t.id !== id);
      return true;
    } catch(e){
      showStatus('წაშლის შეცდომა: ' + (e && e.message ? e.message : 'უცნობი'), 'error');
      return false;
    }
  }

  async function bulkInsertRemote(arr){
    if (!currentUser || !arr || !arr.length) return 0;
    try {
      const rows = arr.map(t => { const { id, ...rest } = t; return { user_id: currentUser.id, data: rest }; });
      const { data, error } = await supabase.from('trades').insert(rows).select('id, data');
      if (error) throw error;
      (data || []).forEach(row => trades.push({ ...row.data, id: row.id }));
      return (data || []).length;
    } catch(e){
      showStatus('იმპორტის შეცდომა: ' + (e && e.message ? e.message : 'უცნობი'), 'error');
      return 0;
    }
  }

  function exportJson(){
    return JSON.stringify(trades, null, 2);
  }

  async function startApp(){
    await loadTrades();
    renderTabs();
    renderBody();
  }

  (async function bootstrap(){
    renderAuthTabs();
    renderAuthBody();
    try {
      const { data: { session } } = await supabase.auth.getSession();
      if (session && session.user){
        await onAuthSuccess(session.user);
      }
    } catch(e){
      showStatus('Supabase-თან დაკავშირება ვერ მოხერხდა — შეამოწმეთ SUPABASE_URL/ANON_KEY კონფიგურაცია.', 'error');
    }
  })();
})();
</script>
